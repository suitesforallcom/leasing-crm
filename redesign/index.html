<script>
// =============================================================================
// LiveData — standalone data layer for the redesign SPA.
// =============================================================================
// Replaces the old localStorage bridge. This SPA is fully independent of
// floor-map-editor.html: it signs in directly to Firebase, subscribes to the
// same Firestore state doc (/workspaces/default/data/state), and pulls Stripe
// invoices via the listStripeInvoices Cloud Function.
//
// Contract for React consumers:
//   window.LiveData = {
//     user:        firebase.User | null,   // null => show sign-in screen
//     authError:   string | null,          // last auth failure to display
//     state:       FirestoreDoc | null,    // raw state doc from Firestore
//     invoices:    Array<InvoiceRow>,      // Stripe rows, newest-first
//     invoicesAt:  number,                 // ms timestamp of last Stripe fetch
//     status:      'boot'|'signin'|'loading-state'|'loading-invoices'|'ready'|'error',
//     lastError:   string | null,
//     // Methods:
//     signIn(email, pass) -> Promise
//     signOut() -> Promise
//     refreshInvoices() -> Promise
//     subscribe(fn) -> unsubscribe    // fn called on any field change
//   };
//
// Firebase config resolution (same tiered strategy as the legacy app):
//   1. /__/firebase/init.json    (served automatically by Firebase Hosting)
//   2. localStorage('sfa_firebase_*')  (dev override)
//   3. Hardcoded (projectId only — user must provide apiKey via step 1 or 2)
// =============================================================================
(function () {
  const WORKSPACE_ID = 'default';
  const FUNCTIONS_REGION = 'us-central1';
  const ROOT_ADMINS = ['tony@al-en.com'];

  const LiveData = {
    user: null,
    authError: null,
    state: null,
    invoices: [],
    invoicesAt: 0,
    status: 'boot',
    lastError: null,
    _firebase: null,
    _auth: null,
    _db: null,
    _fns: null,
    _unsubState: null,
    _listeners: new Set(),
  };

  function emit() {
    for (const fn of LiveData._listeners) {
      try { fn(LiveData); } catch (e) { console.error('[LiveData] listener error', e); }
    }
  }
  LiveData.subscribe = (fn) => {
    LiveData._listeners.add(fn);
    return () => LiveData._listeners.delete(fn);
  };

  function setStatus(s, err) {
    LiveData.status = s;
    if (err !== undefined) LiveData.lastError = err;
    emit();
  }

  async function fetchAutoConfig() {
    try {
      const r = await fetch('/__/firebase/init.json', { cache: 'no-store' });
      if (r.ok) {
        const cfg = await r.json();
        if (cfg && cfg.apiKey && cfg.projectId) return cfg;
      }
    } catch {}
    return null;
  }

  function readLocalConfig() {
    try {
      const projectId = localStorage.getItem('sfa_firebase_project');
      const apiKey = localStorage.getItem('sfa_firebase_key');
      const authDomain = localStorage.getItem('sfa_firebase_domain')
                       || (projectId ? projectId + '.firebaseapp.com' : null);
      return (projectId && apiKey) ? { projectId, apiKey, authDomain } : null;
    } catch { return null; }
  }

  async function resolveConfig() {
    const local = readLocalConfig();
    if (local) return local;
    const auto = await fetchAutoConfig();
    if (auto) return auto;
    // Last-resort hardcoded default — projectId only. If apiKey is missing
    // the user will see a clear error on the sign-in screen.
    return {
      projectId: 'suitesforall',
      authDomain: 'suitesforall.firebaseapp.com',
      apiKey: '',
    };
  }

  async function init() {
    if (!window.firebase || !window.firebase.initializeApp) {
      setStatus('error', 'Firebase SDK failed to load. Check your network / CSP.');
      return;
    }
    let cfg;
    try { cfg = await resolveConfig(); }
    catch (e) { setStatus('error', 'Could not resolve Firebase config: ' + e.message); return; }

    if (!cfg.apiKey) {
      setStatus('error',
        'Firebase API key not configured. Open /__/firebase/init.json on your host, ' +
        'or set localStorage.sfa_firebase_key manually.');
      return;
    }

    try {
      const app = window.firebase.initializeApp(cfg);
      LiveData._firebase = app;
      LiveData._auth = window.firebase.auth(app);
      LiveData._db = window.firebase.firestore(app);
      LiveData._fns = window.firebase.app(app.name).functions(FUNCTIONS_REGION);
    } catch (e) {
      setStatus('error', 'Firebase init failed: ' + e.message);
      return;
    }

    LiveData._auth.onAuthStateChanged(async (user) => {
      LiveData.user = user || null;
      LiveData.authError = null;
      if (!user) {
        // Signed out — tear down data subscriptions.
        if (LiveData._unsubState) { try { LiveData._unsubState(); } catch {} LiveData._unsubState = null; }
        LiveData.state = null;
        LiveData.invoices = [];
        LiveData.invoicesAt = 0;
        setStatus('signin');
        return;
      }
      // Admin whitelist check — matches the legacy app's ROOT_ADMINS list.
      const email = (user.email || '').trim().toLowerCase();
      if (!ROOT_ADMINS.includes(email)) {
        LiveData.authError = 'Email not on admin allowlist.';
        try { await LiveData._auth.signOut(); } catch {}
        setStatus('signin');
        return;
      }
      setStatus('loading-state');
      subscribeToState();
      refreshInvoices().catch(e => console.warn('[LiveData] invoice refresh failed', e));
    });

    setStatus('signin');
  }

  function subscribeToState() {
    if (LiveData._unsubState) { try { LiveData._unsubState(); } catch {} }
    const ref = LiveData._db.doc('workspaces/' + WORKSPACE_ID + '/data/state');
    LiveData._unsubState = ref.onSnapshot(
      (snap) => {
        LiveData.state = snap.exists ? snap.data() : null;
        if (LiveData.status === 'loading-state') setStatus('loading-invoices');
        else emit();
        // Invoices usually arrive in parallel; if they already loaded, flip to ready.
        if (LiveData.invoicesAt > 0 && LiveData.status !== 'ready') setStatus('ready');
      },
      (err) => {
        console.error('[LiveData] state snapshot error', err);
        setStatus('error', 'Firestore read failed: ' + err.message);
      }
    );
  }

  async function refreshInvoices() {
    if (!LiveData._fns) return;
    try {
      const callable = LiveData._fns.httpsCallable('listStripeInvoices');
      const res = await callable({ limit: 200 });
      LiveData.invoices = (res && res.data && res.data.rows) || [];
      LiveData.invoicesAt = Date.now();
      if (LiveData.state && LiveData.status !== 'ready') setStatus('ready');
      else emit();
    } catch (e) {
      console.warn('[LiveData] listStripeInvoices failed', e);
      // Non-fatal — suites will fall back to tenant-based status.
      LiveData.invoices = [];
      LiveData.invoicesAt = Date.now();
      if (LiveData.state) setStatus('ready');
      else emit();
    }
  }
  LiveData.refreshInvoices = refreshInvoices;

  LiveData.signIn = async (email, password) => {
    LiveData.authError = null;
    try {
      await LiveData._auth.signInWithEmailAndPassword(email, password);
    } catch (e) {
      LiveData.authError = e.message || String(e);
      emit();
      throw e;
    }
  };

  // Google sign-in via Firebase popup flow. The Google provider must be
  // enabled in Firebase Console → Authentication → Sign-in method.
  // Known failure modes we surface cleanly:
  //  - auth/popup-blocked → browser killed the popup; tell user to allow popups
  //  - auth/popup-closed-by-user → user dismissed; no error
  //  - auth/operation-not-allowed → Google provider not enabled in Firebase
  LiveData.signInWithGoogle = async () => {
    LiveData.authError = null;
    try {
      if (!window.firebase || !firebase.auth || !firebase.auth.GoogleAuthProvider) {
        throw new Error('Firebase auth SDK missing GoogleAuthProvider');
      }
      const provider = new firebase.auth.GoogleAuthProvider();
      provider.setCustomParameters({ prompt: 'select_account' });
      await LiveData._auth.signInWithPopup(provider);
    } catch (e) {
      // Swallow user-cancelled popup as a no-op (not a real error).
      if (e && e.code === 'auth/popup-closed-by-user') return;
      // Friendlier messages for the two common setup issues.
      if (e && e.code === 'auth/popup-blocked') {
        LiveData.authError = 'Popup was blocked. Allow popups for this site and try again.';
      } else if (e && e.code === 'auth/operation-not-allowed') {
        LiveData.authError = 'Google sign-in is not enabled in Firebase. Ask an admin to enable the Google provider in Authentication → Sign-in method.';
      } else if (e && e.code === 'auth/unauthorized-domain') {
        LiveData.authError = 'This domain is not authorized for Google sign-in. Add it in Firebase Console → Authentication → Settings → Authorized domains.';
      } else {
        LiveData.authError = (e && e.message) || String(e);
      }
      emit();
      throw e;
    }
  };

  LiveData.signOut = async () => {
    try { await LiveData._auth.signOut(); } catch (e) { console.warn(e); }
  };

  window.LiveData = LiveData;
  // Boot after the DOM is idle so React has a chance to mount.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>

//
// Returns:
//   {
//     suites:       Array<Suite>,
//     commonAreas:  Array<Area>,
//     floors:       Array<FloorSummary>,
//     invByUnit:    { [unitId]: InvoiceRow[] sorted newest-first },
//     targetFloorId: number | null,
//     dataSource:   'live' | 'mock',
//   }

const AREA_LABELS = {
  stairs: 'STAIRS', stair: 'STAIRS',
  atrium: 'ATRIUM', lobby: 'LOBBY',
  mechanical: 'MECHANICAL', mech: 'MECHANICAL',
  restroom: 'RESTROOM', bathroom: 'RESTROOM', toilet: 'RESTROOM',
  kitchen: 'KITCHEN', breakroom: 'BREAK',
  elev: 'ELEV.', elevator: 'ELEV.',
  storage: 'STORAGE',
  corridor: 'CORRIDOR', hallway: 'CORRIDOR', hall: 'CORRIDOR',
  common: 'COMMON', utility: 'UTILITY',
};

// Format today as "YYYY-MM" — the key Stripe invoices carry in metadata.ym.
function currentYm(now) {
  const d = new Date(now || Date.now());
  return d.getUTCFullYear() + '-' + String(d.getUTCMonth() + 1).padStart(2, '0');
}

// Derive a per-unit payment status from a list of Stripe invoices for that
// unit. Bucketing rules mirror the legacy app's _collectUnitInvoices:
//   - paid   : most-recent rent invoice for current ym is fully paid
//   - due    : rent invoice exists, unpaid, still within due date
//   - overdue: rent invoice exists, unpaid, past due date
//   - null   : no rent invoice for this month — fall back to occupancy
function deriveStatusFromInvoices(unitInvoices, nowMs) {
  if (!unitInvoices || !unitInvoices.length) return null;
  const ym = currentYm(nowMs);
  // Prefer the CURRENT month's rent invoice.
  const thisMonth = unitInvoices.find(r =>
    (r.metadata && r.metadata.purpose === 'rent') &&
    (r.metadata.ym === ym)
  );
  if (thisMonth) {
    const bucket = String(thisMonth.bucket || thisMonth.status || '').toLowerCase();
    if (bucket === 'paid') return 'paid';
    if (bucket === 'void' || bucket === 'uncollectible') return null;
    // Unpaid — check due date.
    const due = Number(thisMonth.dueDate || 0);
    if (due && due < nowMs) return 'overdue';
    return 'due';
  }
  // No current-month rent invoice. Check if last month is still unpaid.
  const lastUnpaid = unitInvoices.find(r => {
    const b = String(r.bucket || r.status || '').toLowerCase();
    return (r.metadata && r.metadata.purpose === 'rent') && (b === 'open' || b === 'past_due');
  });
  if (lastUnpaid) {
    const due = Number(lastUnpaid.dueDate || 0);
    return (due && due < nowMs) ? 'overdue' : 'due';
  }
  return null;
}

function rebuildFromLiveData(requestedFloorNumber) {
  const LD = window.LiveData;
  const state = LD && LD.state;

  // If we have no state yet, keep the mock arrays so the UI doesn't go blank
  // during first paint. The App gates on LD.status so the sign-in or loader
  // screen hides these anyway.
  if (!state || !state.buildings || !state.buildings[0]) {
    return { suites: SUITES, commonAreas: COMMON_AREAS, floors: FLOORS, invByUnit: {}, targetFloorId: null, dataSource: 'mock' };
  }

  const building = state.buildings[0];
  const floors = building.floors || [];
  // Prefer the caller-requested floor; fall back to the 4th floor if it has
  // units; finally the largest floor. This keeps the UI usable even if the
  // requested floor has no rentable units yet.
  const targetFloor = (requestedFloorNumber != null && floors.find(f => f.number === requestedFloorNumber && (f.units || []).length))
                   || floors.find(f => f.number === 4 && (f.units || []).length)
                   || floors.reduce((a, b) => ((b.units || []).length > ((a && a.units || []).length) ? b : a), null);

  if (!targetFloor || !(targetFloor.units || []).length) {
    return { suites: [], commonAreas: [], floors: [], invByUnit: {}, targetFloorId: null, dataSource: 'live' };
  }

  const tenantsById = new Map((state.tenants || []).map(t => [t.id, t]));
  const leasesByUnit = new Map();
  for (const l of (state.leases || [])) {
    const cur = leasesByUnit.get(l.unitId);
    if (!cur || (l.updatedAt || 0) > (cur.updatedAt || 0)) leasesByUnit.set(l.unitId, l);
  }

  // Bucket Stripe invoices by unitId, newest-first.
  const invByUnit = {};
  for (const r of (LD.invoices || [])) {
    const uid = r && r.metadata && r.metadata.unitId;
    if (!uid) continue;
    (invByUnit[uid] || (invByUnit[uid] = [])).push(r);
  }
  for (const k of Object.keys(invByUnit)) {
    invByUnit[k].sort((a, b) => (b.created || 0) - (a.created || 0));
  }

  const nowMs = Date.now();
  const THIRTY_DAYS = 30 * 864e5;
  const mappedSuites = [];
  const mappedAreas = [];

  for (const u of (targetFloor.units || [])) {
    const type = String(u.type || 'office').toLowerCase();
    const isOffice = (type === 'office' || type === 'suite' || type === 'unit') && u.rentable !== false;
    if (!isOffice) {
      mappedAreas.push({
        id: u.id || ('area_' + mappedAreas.length),
        x: u.x, y: u.y, w: u.w, h: u.h,
        label: AREA_LABELS[type] || type.toUpperCase(),
      });
      continue;
    }

    const lease = leasesByUnit.get(u.id);
    const tenant = lease ? tenantsById.get(lease.tenantId) : null;
    const tenantName = (tenant && (tenant.name || tenant.company)) || u.tenant || '—';

    // Vacancy check: primary signal is u.status. Units with no tenant
    // reference at all also count as vacant.
    const hasTenant = !!(tenant || u.tenant);
    const isVacant = u.status === 'vacant' || (!hasTenant && u.status !== 'occupied');

    // Envelope still awaiting signature? Check both envelope.status (newer
    // shape) and envelopeStatus (legacy flat field).
    const envStatus = lease && (
      (lease.envelope && lease.envelope.status) ||
      lease.envelopeStatus
    );
    const awaitingSig = envStatus && ['sent', 'delivered', 'pending', 'created'].includes(String(envStatus).toLowerCase());

    let status;
    if (isVacant) {
      status = 'vacant';
    } else if (u.status === 'reserved') {
      status = 'reserved';
    } else if (awaitingSig) {
      status = 'pending-signature';
    } else {
      // Real payment status from Stripe, falling back to 'paid' (the operator's
      // implicit assumption when a tenant is seated but no billing signal exists).
      const derived = deriveStatusFromInvoices(invByUnit[u.id], nowMs);
      status = derived || 'paid';
    }

    const isNew = lease && lease.signedAt && (nowMs - Date.parse(lease.signedAt) < THIRTY_DAYS);

    mappedSuites.push({
      id: u.id,
      x: u.x, y: u.y, w: u.w, h: u.h,
      sqft: u.sqft || 0, rent: u.rent || 0,
      tenant: tenantName,
      party: u.cap || 3,
      type: u.window ? 'window' : 'interior',
      status,
      newTenant: !!isNew,
      // Attach tenant + latest invoice for the right panel action lists.
      _invoice: (invByUnit[u.id] || [])[0] || null,
      _email: (tenant && tenant.email) || (u.tenantEmail) || null,
    });
  }

  // Floor roll-up used by the Left Rail and Dashboard.
  const isOccupiedUnit = (x) => {
    if (x.status === 'vacant') return false;
    if (x.status === 'occupied') return true;
    return !!(x.tenant || leasesByUnit.get(x.id));
  };
  const floorsSummary = floors.map(f => {
    const units = (f.units || []).filter(x => {
      const tt = String(x.type || 'office').toLowerCase();
      return (tt === 'office' || tt === 'suite' || tt === 'unit') && x.rentable !== false;
    });
    const occupied = units.filter(isOccupiedUnit).length;
    const revenue  = units.filter(isOccupiedUnit).reduce((s, x) => s + (x.rent || 0), 0);
    return {
      id: f.number,
      name: f.name || (f.number + 'th Floor'),
      occupied,
      total: units.length,
      revenue,
      active: f.number === targetFloor.number,
    };
  });

  // Mutate the legacy top-level `let`s so any consumer reading them directly
  // picks up the new data (Floorplan reads `suites` prop via App, but the
  // window.* mirrors keep debugging easy).
  SUITES = mappedSuites;
  COMMON_AREAS = mappedAreas;
  FLOORS = floorsSummary;
  window.SUITES = SUITES;
  window.COMMON_AREAS = COMMON_AREAS;
  window.FLOORS = FLOORS;
  window.__redesignDataSource = 'live';
  window.__redesignTargetFloor = targetFloor.number;

  return {
    suites: mappedSuites,
    commonAreas: mappedAreas,
    floors: floorsSummary,
    invByUnit,
    targetFloorId: targetFloor.number,
    dataSource: 'live',
  };
}

window.rebuildFromLiveData = rebuildFromLiveData;

</script>

  vacant:   { label: "Vacant",        dot: "#C4C0B8",      bg: "#FFFFFF",          ink: THEME.inkMuted },
  reserved: { label: "Reserved",      dot: THEME.reserved, bg: THEME.reservedSoft, ink: THEME.reservedInk },
  "pending-signature": { label: "Awaiting signature", dot: THEME.pending, bg: THEME.pendingSoft, ink: THEME.pendingInk },

// Currency formatter
function fmt$(n) {
  return "$" + n.toLocaleString("en-US");
}

<script type="text/babel">
// === inlined from src/Floorplan.jsx ===
// Floorplan — the hero. Renders suites with status-based coloring.
// Hover shows a richer tooltip; click selects.

const Floorplan = ({
  suites, commonAreas,
  selectedId, onSelect,
  hoveredId, onHover,
  colorMode, // "status" | "type" | "rent"
  overlays,  // { overdue, pendingSignature, newTenant }
  zoom, setZoom,
  layers,    // { labels, tenants, rent, windows, common, ... }
}) => {
  // Safe fallback so existing callers (if any) don't crash.
  layers = layers || {};
  const svgRef = React.useRef(null);

  // Viewport — compute a tight bounding box around all rendered shapes.
  // Mock data fits within 1040x880, but real buildings from localStorage
  // span larger coordinate ranges. Padding keeps the outline off the edge.
  const VB = React.useMemo(() => {
    const all = [...(suites || []), ...(commonAreas || [])];
    if (!all.length) return { minX: 0, minY: 0, W: 1040, H: 880, pad: 40 };
    const minX = Math.min(...all.map(s => s.x));
    const minY = Math.min(...all.map(s => s.y));
    const maxX = Math.max(...all.map(s => s.x + s.w));
    const maxY = Math.max(...all.map(s => s.y + s.h));
    const pad = 40;
    return { minX, minY, maxX, maxY, pad, W: (maxX - minX) + pad * 2, H: (maxY - minY) + pad * 2 };
  }, [suites, commonAreas]);
  const VB_W = VB.W, VB_H = VB.H;

  const getFill = (s) => {
    if (colorMode === "type") {
      return s.type === "window" ? "#E8EFE4" : "#F4F2EE";
    }
    if (colorMode === "rent") {
      // Heatmap by $/sqft
      const perSqft = s.rent / s.sqft;
      // normalize 2..12
      const t = Math.max(0, Math.min(1, (perSqft - 2) / 10));
      const hue = 145 - t * 145; // green→red
      return `oklch(0.92 0.05 ${hue})`;
    }
    // status mode
    const meta = STATUS_META[s.status];
    return meta ? meta.bg : "#fff";
  };

  const getStroke = (s) => {
    if (selectedId === s.id) return THEME.accent;
    if (hoveredId === s.id) return THEME.borderStrong;
    if (s.status === "vacant") return THEME.borderStrong;
    return THEME.border;
  };

  const getStrokeWidth = (s) => {
    if (selectedId === s.id) return 2;
    return 1;
  };

  const getDash = (s) => {
    if (colorMode === "status" && s.status === "vacant") return "3 3";
    return null;
  };

  // Overlay badges
  const renderOverlay = (s) => {
    const badges = [];
    if (overlays.overdue && s.status === "overdue") {
      badges.push(<circle key="ov" cx={s.x + s.w - 10} cy={s.y + 10} r={6} fill={THEME.overdue}/>);
      badges.push(<text key="ov-t" x={s.x + s.w - 10} y={s.y + 13} textAnchor="middle" fontSize={9} fill="#fff" fontWeight={700}>!</text>);
    }
    if (overlays.pendingSignature && s.status === "pending-signature") {
      badges.push(
        <g key="sig" transform={`translate(${s.x + s.w - 18}, ${s.y + 4})`}>
          <rect width={14} height={14} rx={3} fill={THEME.pending}/>
          <path d="M3 9s1.5-4 3-4 1 4 2.5 4 1-2 2.5-2" stroke="#fff" strokeWidth={1.3} fill="none" strokeLinecap="round"/>
        </g>
      );
    }
    if (overlays.newTenant && s.newTenant) {
      badges.push(
        <g key="new" transform={`translate(${s.x + 4}, ${s.y + 4})`}>
          <circle cx={6} cy={6} r={6} fill={THEME.newStar}/>
          <path d="M6 2l1.2 2.4 2.6.3-1.9 1.8.5 2.6L6 7.9 3.6 9.1l.5-2.6L2.2 4.7l2.6-.3L6 2z" fill="#fff"/>
        </g>
      );
    }
    return badges;
  };

  return (
    <div style={fpStyles.root}>
      {/* Color-mode segmented control */}
      <div style={fpStyles.topControls}>
        <div style={fpStyles.segGroup}>
          {[
            { id: "status", label: "Lease status" },
            { id: "type",   label: "Unit type" },
            { id: "rent",   label: "Rent heatmap" },
          ].map(m => (
            <button
              key={m.id}
              onClick={() => window.__setColorMode?.(m.id)}
              style={{
                ...fpStyles.segBtn,
                ...(colorMode === m.id ? fpStyles.segBtnActive : {}),
              }}
            >{m.label}</button>
          ))}
        </div>
        <div style={{ flex: 1 }}/>
        <div style={fpStyles.floorLabel}>
          <Icon name="building" size={13} style={{ color: THEME.inkSubtle }}/>
          <span>
            {(() => {
              const n = window.__redesignTargetFloor;
              if (n == null) return "4th Floor · Floorplan";
              // Ordinal suffix — handles the 11–13 exception properly.
              const v = n % 100;
              const suf = (v >= 11 && v <= 13) ? 'th'
                : (n % 10 === 1) ? 'st'
                : (n % 10 === 2) ? 'nd'
                : (n % 10 === 3) ? 'rd' : 'th';
              return `${n}${suf} Floor · Floorplan`;
            })()}
          </span>
          <span style={{
            marginLeft: 8, padding: "1px 7px", fontSize: 10, fontWeight: 600, borderRadius: 6,
            background: window.__redesignDataSource === "real" ? THEME.paidSoft : THEME.surfaceAlt,
            color:      window.__redesignDataSource === "real" ? THEME.paidInk  : THEME.inkSubtle,
            letterSpacing: 0.4, textTransform: "uppercase",
          }}>
            {window.__redesignDataSource === "real" ? "Live" : "Mock"}
          </span>
        </div>
      </div>

      {/* Plan SVG */}
      <div style={fpStyles.svgWrap}>
        <svg
          ref={svgRef}
          viewBox={`${VB.minX - VB.pad} ${VB.minY - VB.pad} ${VB_W} ${VB_H}`}
          preserveAspectRatio="xMidYMid meet"
          style={{ width: "100%", height: "100%", display: "block" }}
        >
          {/* Subtle floor outline */}
          <defs>
            <pattern id="gridDots" width="16" height="16" patternUnits="userSpaceOnUse">
              <circle cx="1" cy="1" r="0.5" fill={THEME.gridLine}/>
            </pattern>
          </defs>
          <rect x={VB.minX - VB.pad} y={VB.minY - VB.pad} width={VB_W} height={VB_H} fill="url(#gridDots)"/>

          {/* Building outline — tight bounding box around actual content */}
          <rect
            x={VB.minX - VB.pad / 2} y={VB.minY - VB.pad / 2}
            width={(VB.maxX - VB.minX) + VB.pad} height={(VB.maxY - VB.minY) + VB.pad}
            rx={6}
            fill={THEME.surface} stroke={THEME.border} strokeWidth={1.5}
          />

          {/* Common areas */}
          {layers.common !== false && commonAreas.map(ca => (
            <g key={ca.id}>
              <rect
                x={ca.x} y={ca.y} width={ca.w} height={ca.h}
                fill={THEME.common} stroke={THEME.border} strokeWidth={0.5}
              />
              {ca.label && (
                <text
                  x={ca.x + ca.w/2} y={ca.y + ca.h/2}
                  textAnchor="middle" dominantBaseline="middle"
                  fontSize={9} fill={THEME.commonInk}
                  fontWeight={500}
                  letterSpacing={0.5}
                >{ca.label}</text>
              )}
            </g>
          ))}

          {/* Suites */}
          {suites.map(s => {
            const isSel = selectedId === s.id;
            const isHover = hoveredId === s.id;
            const showDetail = isSel || isHover || (s.w > 85 && s.h > 75);
            return (
              <g
                key={s.id}
                onMouseEnter={() => onHover(s.id)}
                onMouseLeave={() => onHover(null)}
                onClick={() => onSelect(s.id)}
                style={{ cursor: "pointer" }}
              >
                <rect
                  x={s.x} y={s.y} width={s.w} height={s.h}
                  fill={getFill(s)}
                  stroke={getStroke(s)}
                  strokeWidth={getStrokeWidth(s)}
                  strokeDasharray={getDash(s)}
                  rx={2}
                />
                {/* Suite number — controlled by 'labels' layer */}
                {layers.labels !== false && (
                  <text
                    x={s.x + 5} y={s.y + 13}
                    fontSize={10} fontWeight={600}
                    fill={THEME.ink}
                  >{s.id}</text>
                )}
                {/* Rent — 'rent' layer + visible when big enough OR selected/hover */}
                {layers.rent !== false && showDetail && (
                  <text
                    x={s.x + 5} y={s.y + 26}
                    fontSize={9} fill={THEME.inkMuted}
                    style={{ fontVariantNumeric: "tabular-nums" }}
                  >${s.rent.toLocaleString()}</text>
                )}
                {/* Tenant name — 'tenants' layer + only when big or selected */}
                {layers.tenants !== false && (isSel || isHover || (s.w > 85 && s.h > 85)) && s.tenant !== "—" && (
                  <text
                    x={s.x + 5} y={s.y + 38}
                    fontSize={8.5} fill={THEME.inkSubtle}
                    style={{ pointerEvents: "none" }}
                  >
                    {s.tenant.length > 14 ? s.tenant.slice(0, 13) + "…" : s.tenant}
                  </text>
                )}
                {/* Window indicator — 'windows' layer */}
                {layers.windows !== false && s.type === "window" && (
                  <line
                    x1={s.x + 12} y1={s.y - 0.5}
                    x2={s.x + s.w - 12} y2={s.y - 0.5}
                    stroke={THEME.pending} strokeWidth={2}
                  />
                )}
                {/* Overlays */}
                {renderOverlay(s)}
              </g>
            );
          })}

          {/* Compass */}
          <g transform={`translate(${VB.maxX - 20}, ${VB.minY + 20})`}>
            <circle r={18} fill={THEME.surface} stroke={THEME.border}/>
            <path d="M0 -12 L4 0 L0 -4 L-4 0 Z" fill={THEME.ink}/>
            <text x={0} y={-14} textAnchor="middle" fontSize={8} fill={THEME.inkMuted} fontWeight={600}>N</text>
          </g>

          {/* Scale bar */}
          <g transform={`translate(${VB.minX + 20}, ${VB.maxY})`}>
            <line x1={0} y1={0} x2={80} y2={0} stroke={THEME.ink} strokeWidth={1.5}/>
            <line x1={0} y1={-3} x2={0} y2={3} stroke={THEME.ink} strokeWidth={1.5}/>
            <line x1={40} y1={-3} x2={40} y2={3} stroke={THEME.ink} strokeWidth={1.5}/>
            <line x1={80} y1={-3} x2={80} y2={3} stroke={THEME.ink} strokeWidth={1.5}/>
            <text x={40} y={15} textAnchor="middle" fontSize={9} fill={THEME.inkMuted}>20 ft</text>
          </g>
        </svg>
      </div>

      {/* Bottom legend bar — compact, inline */}
      <div style={fpStyles.legend}>
        {colorMode === "status" && (
          <>
            <LegendItem color={THEME.paid}     label="Paid"/>
            <LegendItem color={THEME.due}      label="Due"/>
            <LegendItem color={THEME.overdue}  label="Overdue"/>
            <LegendItem color={THEME.reserved} label="Reserved"/>
            <LegendItem color={THEME.pending}  label="Awaiting signature"/>
            <LegendItem color="#fff" border={THEME.borderStrong} dashed label="Vacant"/>
          </>
        )}
        {colorMode === "type" && (
          <>
            <LegendItem color="#E8EFE4" label="Window"/>
            <LegendItem color="#F4F2EE" label="Interior"/>
            <LegendItem color={THEME.common} label="Common"/>
          </>
        )}
        {colorMode === "rent" && (
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <span style={{ fontSize: 11, color: THEME.inkSubtle }}>$/ft²</span>
            <div style={{
              width: 120, height: 10, borderRadius: 5,
              background: "linear-gradient(90deg, oklch(0.92 0.05 145), oklch(0.92 0.05 75), oklch(0.92 0.05 0))",
              border: `1px solid ${THEME.border}`,
            }}/>
            <span style={{ fontSize: 11, color: THEME.inkMuted }}>$2 – $12</span>
          </div>
        )}

        <div style={{ flex: 1 }}/>

        {/* Overlay toggles */}
        <div style={fpStyles.overlayToggles}>
          <OverlayToggle
            active={overlays.overdue}
            onClick={() => window.__toggleOverlay?.("overdue")}
            color={THEME.overdue}
            label="Overdue"
          />
          <OverlayToggle
            active={overlays.pendingSignature}
            onClick={() => window.__toggleOverlay?.("pendingSignature")}
            color={THEME.pending}
            label="Signatures"
          />
          <OverlayToggle
            active={overlays.newTenant}
            onClick={() => window.__toggleOverlay?.("newTenant")}
            color={THEME.newStar}
            label="New (30d)"
          />
        </div>
      </div>

      {/* Zoom controls (floating, bottom-left) */}
      <div style={fpStyles.zoom}>
        <button style={fpStyles.zoomBtn} onClick={() => setZoom(z => Math.min(2, z + 0.1))}>
          <Icon name="zoomIn" size={14}/>
        </button>

<script type="text/babel">
// === inlined from src/RightPanel.jsx ===
// Right panel — contextual
// When nothing selected: Portfolio dashboard (KPIs, revenue, floor summary, action queues)
// When a suite is selected: Unit detail with actions (send reminder, message tenant, etc.)

const RightPanel = ({
  tab, setTab,
  suites, floors, currentFloor,
  selectedId, onSelect,
  onSendReminder, onMessageTenant, onMarkPaid,
  messageToast,
  layers, setLayers,
}) => {

  return (
    <aside style={rpStyles.root}>
      {/* Tabs */}
      <div style={rpStyles.tabs}>
        {["Dashboard", "Unit", "Layers"].map(t => {
          const active = tab === t.toLowerCase();
          const enabled = t !== "Unit" || selected;
          return (
            <button
              key={t}
              onClick={() => enabled && setTab(t.toLowerCase())}
              style={{
                ...rpStyles.tab,
                ...(active ? rpStyles.tabActive : {}),
                opacity: enabled ? 1 : 0.4,
                cursor: enabled ? "pointer" : "not-allowed",
              }}
            >
              {t}
              {t === "Unit" && selected && (
                <span style={rpStyles.tabBadge}>{selected.id}</span>

          );
        })}

      <div style={rpStyles.scroll}>
        {tab === "dashboard" && <DashboardTab suites={suites} floors={floors} currentFloor={currentFloor} onSelect={onSelect} setTab={setTab}/>}
        {tab === "unit" && selected && <UnitTab suite={selected} onSendReminder={onSendReminder} onMessageTenant={onMessageTenant} onMarkPaid={onMarkPaid}/>}
        {tab === "layers" && <LayersTab layers={layers} setLayers={setLayers}/>}
      </div>

      {messageToast && (
        <div style={rpStyles.toast}>
          <Icon name="check" size={13} style={{ color: THEME.paid }}/>
          <span>{messageToast}</span>
        </div>
      )}
    </aside>
  );
};

// ─── Dashboard Tab ────────────────────────────────────────────
// Format YYYY-MM for the current month (UTC).
function _currentYm(nowMs) {
  const d = new Date(nowMs || Date.now());
  return d.getUTCFullYear() + '-' + String(d.getUTCMonth() + 1).padStart(2, '0');
}
// Sum paid rent for the current month across all units, from real Stripe invoices.
function _collectedThisMonth(invoices, nowMs) {
  const ym = _currentYm(nowMs);
  let paid = 0, outstanding = 0;
  for (const r of (invoices || [])) {
    if (!r || !r.metadata || r.metadata.purpose !== 'rent' || r.metadata.ym !== ym) continue;
    const b = String(r.bucket || r.status || '').toLowerCase();
    if (b === 'paid') paid += Number(r.total || 0);
    else if (b === 'void' || b === 'uncollectible') continue;
    else outstanding += Number(r.amountRemaining || r.total || 0);
  }
  return { paid, outstanding };
}
// Average rent per ft² for a given unit type ('window' | 'interior' | 'all').
// Pass 'all' (or any falsy value) for the overall portfolio average across
// all rentable units. Uses sqft-weighted average — NOT a simple mean of
// per-unit rates — so a 1,000 ft² suite at $20/ft² counts more than a
// 100 ft² suite at $40/ft². This matches CRE convention and avoids
// distortion from tiny outlier units.
function _avgRentPerSqft(suites, type) {
  const matches = (s) => {
    if (!s || !(s.sqft > 0) || !(s.rent > 0)) return false;
    if (!type || type === 'all') return true;
    return s.type === type;
  };
  const subset = suites.filter(matches);
  if (!subset.length) return null;
  const totalRent = subset.reduce((sum, s) => sum + s.rent, 0);
  const totalSqft = subset.reduce((sum, s) => sum + s.sqft, 0);
  return totalSqft ? (totalRent * 12) / totalSqft : null; // annualized $/ft² (standard CRE convention)
}

const DashboardTab = ({ suites, floors, currentFloor, onSelect, setTab }) => {
  const vacant = suites.filter(s => s.status === "vacant").length;
  const occupied = suites.filter(s => s.status !== "vacant" && s.status !== "reserved").length;
  const total = suites.length || 1; // avoid divide-by-zero on first render

  // Monthly run-rate = rent committed by leases on occupied units.
  const monthlyCommitted = suites.reduce((sum, s) => s.status !== "vacant" && s.status !== "reserved" ? sum + s.rent : sum, 0);
  const potential = suites.reduce((sum, s) => sum + s.rent, 0);

  // Actual collected this month, from Stripe (in dollars — metadata amounts are in cents).
  const live = (typeof window !== 'undefined' && window.LiveData) || null;
  const { paid: collectedCents, outstanding: outstandingCents } = _collectedThisMonth(live && live.invoices, Date.now());
  const collected = collectedCents / 100;
  const outstanding = outstandingCents / 100;
  const pctCollected = monthlyCommitted > 0 ? Math.min(100, Math.round((collected / monthlyCommitted) * 100)) : 0;

  const occupiedPct = Math.round((occupied / total) * 100);

  const overdueList = suites.filter(s => s.status === "overdue");
  const pendingList = suites.filter(s => s.status === "pending-signature");
  const dueList     = suites.filter(s => s.status === "due");

  const rentableSqft = suites.reduce((sum, s) => sum + s.sqft, 0);
  const occupiedSqft = suites.filter(s => s.status !== "vacant" && s.status !== "reserved").reduce((sum, s) => sum + s.sqft, 0);

  // Live floor + building name — no more hardcoded "SuitesForAll · 4th Floor".
  const activeFloor = (floors || []).find(f => f.id === currentFloor) || (floors || [])[0] || null;
  const building = (live && live.state && live.state.buildings && live.state.buildings[0]) || null;
  const buildingName = (building && (building.name || building.label)) || 'SuitesForAll';
  const floorName = (activeFloor && activeFloor.name) || 'Floor';

  // Real per-ft² averages — by type and overall. Annualized so the
  // numbers read like commercial-RE asking rates ($25/ft²/yr style),
  // not residential per-month figures.
  const windowRate   = _avgRentPerSqft(suites, 'window');
  const interiorRate = _avgRentPerSqft(suites, 'interior');
  const overallRate  = _avgRentPerSqft(suites, 'all');

  // Hero metric is run-rate revenue (sum of rent on every leased unit),
  // shown alongside potential (sum of asking rents on every rentable
  // unit, leased or not). pct = run-rate / potential — i.e. occupancy
  // weighted by dollars, which is the property manager's headline KPI.
  // Stripe collected/outstanding still gets surfaced below, but only as
  // a secondary line so the primary number matches what an owner sees
  // on every other rent roll in the industry.
  const pctRevenue = potential > 0 ? Math.min(100, Math.round((monthlyCommitted / potential) * 100)) : 0;

  return (
    <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Context */}
      <div>
        <div style={rpStyles.contextLabel}>FLOOR</div>
        <div style={rpStyles.contextValue}>{buildingName} · {floorName}</div>
      </div>

      {/* Revenue — hero metric. Big = monthly run-rate (industry standard);
          Stripe collected appears as a secondary live-data line below. */}
      <div style={rpStyles.heroCard}>
        <div style={{ display: "flex", alignItems: "baseline", gap: 8 }}>
          <span style={rpStyles.heroNum}>{fmt$(monthlyCommitted)}</span>
          <span style={rpStyles.heroUnit}>/ month</span>
        </div>
        <div style={rpStyles.heroSub}>
          Monthly revenue ({pctRevenue}% of potential {fmt$(potential)})
        </div>
        <div style={rpStyles.progressTrack}>
          <div style={{ ...rpStyles.progressFill, width: `${pctRevenue}%`, background: THEME.paid }}/>
        </div>
        {(collected > 0 || outstanding > 0) && (
          <div style={{ fontSize: 11, color: THEME.inkSubtle, fontVariantNumeric: 'tabular-nums' }}>
            {fmt$(collected)} collected this month
            {outstanding > 0 ? ` · ${fmt$(outstanding)} outstanding` : ''}
          </div>
        )}
        <div style={rpStyles.heroGrid}>
          <MiniStat label="Occupied" value={`${occupied}/${suites.length || 0}`} sub={`${occupiedPct}%`}/>
          <MiniStat label="Vacant"   value={vacant}  sub={`${suites.length ? Math.round(vacant/suites.length*100) : 0}%`}/>
          <MiniStat label="Rentable" value={`${occupiedSqft.toLocaleString()} / ${rentableSqft.toLocaleString()}`} sub="ft² rentable"/>
        </div>
      </div>

      {/* Action queues — the property manager's to-do list */}
      <Section title="Needs attention" count={overdueList.length + pendingList.length + dueList.length}>
        {overdueList.length > 0 && (
          <ActionGroup
            title={`${overdueList.length} overdue`}
            amount={overdueList.reduce((a,s)=>a+s.rent, 0)}
            color={THEME.overdue}
            items={overdueList}
            onSelect={(s) => { onSelect(s.id); setTab("unit"); }}
            actionLabel="Send reminder"
          />
        )}
        {pendingList.length > 0 && (
          <ActionGroup
            title={`${pendingList.length} awaiting signature`}
            color={THEME.pending}
            items={pendingList}
            onSelect={(s) => { onSelect(s.id); setTab("unit"); }}
            actionLabel="Resend"
          />
        )}
        {dueList.length > 0 && (
          <ActionGroup
            title={`${dueList.length} due this week`}
            color={THEME.due}
            items={dueList}
            onSelect={(s) => { onSelect(s.id); setTab("unit"); }}
            actionLabel="Remind"
          />
        )}
      </Section>

      {/* Floor summary */}
      <Section title="Floors in building">
        {floors.map(f => (
          <FloorRow key={f.id} floor={f} active={f.id === currentFloor}/>
        ))}
      </Section>

      {/* Rates summary — three sqft-weighted, annualized averages so the
          property manager can compare asking rents at a glance. Window
          units typically command a premium; the overall "Average" is a
          weighted blend across both pools. Annualized $/ft²/yr is the
          standard CRE quoting convention. */}
      <Section title="Average rent">
        <div style={{ display: "flex", gap: 8 }}>
          <RateCard label="Window"   value={windowRate   ? `$${windowRate.toFixed(0)}`   : '—'} sub="per ft² / yr" icon="window"/>
          <RateCard label="Interior" value={interiorRate ? `$${interiorRate.toFixed(0)}` : '—'} sub="per ft² / yr" icon="wrench"/>
          <RateCard label="Average"  value={overallRate  ? `$${overallRate.toFixed(0)}`  : '—'} sub="per ft² / yr" icon="dollar"/>
        </div>
      </Section>
    </div>
  );
};

// ─── Unit Tab ────────────────────────────────────────────
// Helpers for the live Unit tab
const MONTH_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

// Return the lease record for a given unit id (newest wins on updatedAt).
function getLeaseForUnit(unitId) {
  const leases = (window.LiveData?.state?.leases || []);
  let best = null;
  for (const l of leases) {
    if (String(l.unitId) !== String(unitId)) continue;
    if (!best || (l.updatedAt || 0) > (best.updatedAt || 0)) best = l;
  }
  return best;
}

// Return all Stripe invoices for a given unit id, newest-first.
function getInvoicesForUnit(unitId) {
  const all = (window.LiveData?.invoices || []);
  return all
    .filter(r => r && r.metadata && String(r.metadata.unitId) === String(unitId))
    .sort((a, b) => (b.created || 0) - (a.created || 0));
}

// Roll up invoice history into paid-on-time / paid-late / missing counts.
function summarizeInvoices(invoices) {
  let paid = 0, late = 0, open = 0, overdue = 0;
  const now = Date.now();
  for (const r of invoices) {
    const b = String(r.bucket || r.status || '').toLowerCase();
    if (b === 'paid') paid++;
    else if (b === 'void' || b === 'uncollectible') {}
    else {
      // open / past_due / draft
      const due = Number(r.dueDate || 0);
      if (due && due < now) overdue++;
      else open++;
    }
  }
  return { paid, late, open, overdue, total: paid + open + overdue };
}

// Days between two ms timestamps (positive if a > b).
function daysBetween(a, b) {
  return Math.round((a - b) / 864e5);
}

const UnitTab = ({ suite, onSendReminder, onMessageTenant, onMarkPaid }) => {
  const isEmpty = suite.tenant === "—" || suite.status === 'vacant';
  const lease = getLeaseForUnit(suite.id);
  const invoices = getInvoicesForUnit(suite.id);
  const summary = summarizeInvoices(invoices);
  const latest = invoices[0] || null;
  const now = Date.now();

  // Parse lease.signedAt into a friendly "since MMM YYYY" string.
  const leaseSince = React.useMemo(() => {
    const raw = lease && lease.signedAt;
    if (!raw) return null;
    const d = new Date(raw);
    if (isNaN(d)) return null;
    return `${MONTH_SHORT[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
  }, [lease]);

  // Lease end / expiry display.
  const leaseExpires = React.useMemo(() => {
    const raw = lease && (lease.endDate || lease.leaseEnd);
    if (!raw) return null;
    const d = new Date(raw);
    if (isNaN(d)) return null;
    return `${MONTH_SHORT[d.getUTCMonth()]} ${d.getUTCFullYear()}`;
  }, [lease]);

  // "X days past due" for overdue / "Due in X days" for due.
  const dueSubtitle = React.useMemo(() => {
    if (!latest || !latest.dueDate) return null;
    const d = daysBetween(latest.dueDate, now);
    if (suite.status === 'overdue') return `${Math.abs(d)} days past due · ${fmt$(latest.amountRemaining || suite.rent)}`;
    if (suite.status === 'due')     return `Due in ${Math.max(d, 0)} days · ${fmt$(latest.amountRemaining || suite.rent)}`;
    return null;
  }, [latest, suite.status, suite.rent, now]);

  // Envelope status string for the "resend lease" action subtitle.
  const envSub = React.useMemo(() => {
    const envStatus = lease && ((lease.envelope && lease.envelope.status) || lease.envelopeStatus);
    const sentAt = lease && (lease.sentAt || (lease.envelope && lease.envelope.sentAt));
    if (!envStatus) return 'Not yet sent';
    const t = sentAt ? Date.parse(sentAt) : null;
    const d = t ? daysBetween(now, t) : null;
    const status = String(envStatus).toUpperCase();
    return d != null ? `${status} · ${d}d ago via DocuSign` : `${status} via DocuSign`;
  }, [lease, now]);

  // Build the 12-month payment strip from REAL invoice history.
  // Each cell is a calendar month (UTC), colored by what happened for that ym:
  //   paid on time  → green (solid)
  //   paid late     → amber
  //   open / overdue→ rose
  //   no invoice    → neutral outline
  const monthCells = React.useMemo(() => {
    const cells = [];
    const d = new Date();
    // Start 11 months ago, end at current month.
    for (let i = 11; i >= 0; i--) {
      const dt = new Date(Date.UTC(d.getUTCFullYear(), d.getUTCMonth() - i, 1));
      const ym = dt.getUTCFullYear() + '-' + String(dt.getUTCMonth() + 1).padStart(2, '0');
      const inv = invoices.find(r =>
        (r.metadata && r.metadata.purpose === 'rent') && (r.metadata.ym === ym)
      );
      let color = null;
      let tip = `${MONTH_SHORT[dt.getUTCMonth()]} ${dt.getUTCFullYear()}`;
      if (inv) {
        const b = String(inv.bucket || inv.status || '').toLowerCase();
        if (b === 'paid') { color = THEME.paid; tip += ' · paid ' + fmt$(inv.total || 0); }
        else if (b === 'void' || b === 'uncollectible') { tip += ' · ' + b; }
        else {
          const due = Number(inv.dueDate || 0);
          if (due && due < now) { color = THEME.overdue; tip += ' · overdue'; }
          else { color = THEME.due; tip += ' · open'; }
        }
      } else {
        tip += ' · no invoice';
      }
      cells.push({ ym, color, tip });
    }
    return cells;
  }, [invoices, now]);

  return (
    <div style={{ padding: 16, display: "flex", flexDirection: "column", gap: 16 }}>
      {/* Header */}
      <div>
        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
          <span style={rpStyles.unitId}>Suite {suite.id}</span>
          <StatusPill status={suite.status}/>
          {suite.newTenant && (
            <span style={{ ...rpStyles.ghostChip, color: THEME.newStar, borderColor: THEME.newStar }}>
              <Icon name="star" size={10}/> New
            </span>
          )}
        </div>
        <div style={{ fontSize: 12, color: THEME.inkSubtle }}>
          {window.__redesignTargetFloor ? `${window.__redesignTargetFloor}th Floor · ` : ''}
          {suite.type === "window" ? "Window unit" : "Interior unit"} · {suite.sqft} ft² · {suite.party}-person capacity
        </div>
      </div>

      {/* Rent breakdown */}
      <div style={rpStyles.unitCard}>
        <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between" }}>
          <span style={rpStyles.unitCardLabel}>Monthly rent</span>
          <span style={rpStyles.unitCardNum}>{fmt$(suite.rent)}</span>
        </div>
        <div style={{ display: "flex", justifyContent: "space-between", fontSize: 11, color: THEME.inkSubtle, marginTop: 4 }}>
          <span>Effective rate</span>
          <span style={{ fontVariantNumeric: "tabular-nums" }}>
            {suite.sqft ? `$${(suite.rent / suite.sqft).toFixed(2)} / ft²` : '—'}
          </span>
        </div>
      </div>

      {/* Tenant */}
      {!isEmpty ? (
        <div>
          <div style={rpStyles.sectionTitle}><span>Tenant</span></div>
          <div style={rpStyles.tenantCard}>
            <div style={rpStyles.tenantAvatar}>{suite.tenant.split(/\s+/).map(p=>p[0]).slice(0,2).join("")}</div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontSize: 13, fontWeight: 600, color: THEME.ink, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{suite.tenant}</div>
              <div style={{ fontSize: 11, color: THEME.inkSubtle }}>
                Tenant{leaseSince ? ` · since ${leaseSince}` : ''}
              </div>
            </div>
            <button style={rpStyles.iconBtn} title="Message" onClick={() => onMessageTenant(suite)}>
              <Icon name="message" size={14}/>
            </button>
          </div>
        </div>
      ) : (
        <div style={rpStyles.emptyTenant}>
          <div style={{ fontSize: 13, fontWeight: 500, color: THEME.ink, marginBottom: 2 }}>Unit is vacant</div>
          <div style={{ fontSize: 11, color: THEME.inkSubtle, marginBottom: 10 }}>Available immediately · list rate {fmt$(suite.rent)}/mo</div>
          <button style={rpStyles.primaryBtn}>
            <Icon name="plus" size={13}/> Add to listing
          </button>
        </div>
      )}

      {/* Contextual actions — all derived from real invoice / lease state. */}
      {!isEmpty && (
        <div>
          <div style={rpStyles.sectionTitle}><span>Actions</span></div>
          <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
            {suite.status === "overdue" && (
              <ActionRow icon="send" label="Send payment reminder" sub={dueSubtitle || `Past due · ${fmt$(suite.rent)}`} onClick={() => onSendReminder(suite)} color={THEME.overdue}/>
            )}
            {suite.status === "due" && (
              <ActionRow icon="send" label="Send gentle reminder" sub={dueSubtitle || `Due soon`} onClick={() => onSendReminder(suite)} color={THEME.due}/>
            )}
            {suite.status === "pending-signature" && (
              <ActionRow icon="signature" label="Resend lease for signature" sub={envSub} onClick={() => onSendReminder(suite)} color={THEME.pending}/>
            )}
            {(suite.status === "overdue" || suite.status === "due") && (
              <ActionRow icon="check" label="Mark as paid" onClick={() => onMarkPaid(suite)}/>
            )}
            {latest && latest.hostedUrl && (
              <ActionRow
                icon="dollar"
                label="Open latest invoice"
                sub={`${(latest.number || latest.id || '').toString().slice(0, 24)} · ${fmt$(latest.total || 0)}`}
                onClick={() => window.open(latest.hostedUrl, '_blank', 'noopener')}
              />
            )}
            <ActionRow
              icon="file"
              label="View lease agreement"
              sub={leaseExpires ? `Expires ${leaseExpires}` : (lease ? 'Lease on file' : 'No lease on file')}
            />
            <ActionRow
              icon="dollar"
              label="Invoice history"
              sub={summary.total
                ? `${summary.paid}/${summary.total} paid${summary.overdue ? ` · ${summary.overdue} overdue` : ''}${summary.open ? ` · ${summary.open} open` : ''}`
                : 'No invoices yet'
              }
            />
          </div>
        </div>
      )}

const LAYER_DEFS = [
  { id: "labels",     label: "Suite numbers",     enabled: true  },

<script type="text/babel">
const TWEAKS = /*EDITMODE-BEGIN*/{
  "density": "comfortable",
  "dark": false,
  "colorMode": "status",
  "showOverdue": true,
  "showSignatures": true,
  "showNew": true
}/*EDITMODE-END*/;

// ─── Sign-in gate ────────────────────────────────────────────────────
// Shown whenever LiveData.user is null. Submits to LiveData.signIn which
// wraps firebase.auth().signInWithEmailAndPassword. Errors are surfaced
// inline. Admin whitelist check happens server-side-ish in LiveData's
// onAuthStateChanged — unauthorized users get bounced back here.
const SignInScreen = ({ live }) => {
  const [email, setEmail] = React.useState('');
  const [password, setPassword] = React.useState('');
  const [busy, setBusy] = React.useState(false);
  const [googleBusy, setGoogleBusy] = React.useState(false);
  const [err, setErr] = React.useState(null);

  React.useEffect(() => {
    if (live.authError || live.lastError) setErr(live.authError || live.lastError);
    else if (live.status === 'error') setErr('Could not connect to server. Check your internet connection.');
  }, [live.authError, live.lastError, live.status]);

  const submit = async (e) => {
    e.preventDefault();
    if (!email || !password) { setErr('Enter both email and password.'); return; }
    setBusy(true); setErr(null);
    try { await window.LiveData.signIn(email.trim(), password); }
    catch (ex) { setErr(ex.message || String(ex)); }
    finally { setBusy(false); }
  };

  const signInGoogle = async () => {
    setGoogleBusy(true); setErr(null);
    try { await window.LiveData.signInWithGoogle(); }
    catch (ex) {
      // signInWithGoogle already sets LiveData.authError with a friendly
      // message; the effect above will surface it. Fall back if somehow empty.
      if (!window.LiveData.authError) setErr(ex.message || String(ex));
    }
    finally { setGoogleBusy(false); }
  };

  const isBootError = live.status === 'error';
  const anyBusy = busy || googleBusy || isBootError;

  return (
    <div style={{
      height: '100vh', display: 'grid', placeItems: 'center',
      background: THEME.bg,
    }}>
      <form onSubmit={submit} style={{
        width: 360,
        background: THEME.surface,
        border: '1px solid ' + THEME.border,
        borderRadius: 12,
        boxShadow: THEME.shadowLg,
        padding: 28,
        display: 'flex', flexDirection: 'column', gap: 16,
      }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 600, color: THEME.ink }}>SuitesForAll</div>
          <div style={{ fontSize: 12, color: THEME.inkMuted, marginTop: 4 }}>Sign in to continue</div>
        </div>
        <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          <span style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 0.5, color: THEME.inkSubtle }}>Email</span>
          <input
            type="email"
            autoComplete="username"
            value={email}
            onChange={e => setEmail(e.target.value)}
            disabled={anyBusy}
            style={{
              padding: '8px 10px',
              border: '1px solid ' + THEME.border,
              borderRadius: 6,
              fontSize: 13,
              background: THEME.bg,
              color: THEME.ink,
              fontFamily: 'inherit',
            }}
          />
        </label>
        <label style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          <span style={{ fontSize: 11, textTransform: 'uppercase', letterSpacing: 0.5, color: THEME.inkSubtle }}>Password</span>
          <input
            type="password"
            autoComplete="current-password"
            value={password}
            onChange={e => setPassword(e.target.value)}
            disabled={anyBusy}
            style={{
              padding: '8px 10px',
              border: '1px solid ' + THEME.border,
              borderRadius: 6,
              fontSize: 13,
              background: THEME.bg,
              color: THEME.ink,
              fontFamily: 'inherit',
            }}
          />
        </label>
        {err && (
          <div style={{
            fontSize: 12, color: THEME.overdueInk || '#7f1d1d',
            background: THEME.overdueSoft || '#FEE7EC',
            border: '1px solid ' + (THEME.overdue || '#E11D48'),
            borderRadius: 6, padding: '8px 10px',
          }}>{err}</div>
        )}
        <button
          type="submit"
          disabled={anyBusy}
          style={{
            padding: '10px 14px',
            border: 'none',
            borderRadius: 6,
            background: THEME.accent,
            color: '#fff',
            fontSize: 13, fontWeight: 600,
            cursor: anyBusy ? 'not-allowed' : 'pointer',
            opacity: anyBusy ? 0.6 : 1,
          }}
        >{busy ? 'Signing in…' : 'Sign in'}</button>

        {/* OR divider */}
        <div style={{
          display: 'flex', alignItems: 'center', gap: 10,
          fontSize: 10, color: THEME.inkSubtle,
          textTransform: 'uppercase', letterSpacing: 0.5,
        }}>
          <div style={{ flex: 1, height: 1, background: THEME.border }}/>
          <span>or</span>
          <div style={{ flex: 1, height: 1, background: THEME.border }}/>
        </div>

        {/* Google sign-in — uses Firebase signInWithPopup + GoogleAuthProvider. */}
        <button
          type="button"
          onClick={signInGoogle}
          disabled={anyBusy}
          style={{
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 10,
            padding: '10px 14px',
            border: '1px solid ' + THEME.border,
            borderRadius: 6,
            background: THEME.surface,
            color: THEME.ink,
            fontSize: 13, fontWeight: 500,
            cursor: anyBusy ? 'not-allowed' : 'pointer',
            opacity: anyBusy ? 0.6 : 1,
            fontFamily: 'inherit',
          }}
        >
          {/* Inline Google "G" logo. */}
          <svg width="16" height="16" viewBox="0 0 18 18" aria-hidden="true">
            <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 01-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
            <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 009 18z"/>
            <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 013.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.997 8.997 0 000 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
            <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 00.957 4.962L3.964 7.294C4.672 5.167 6.656 3.58 9 3.58z"/>
          </svg>
          <span>{googleBusy ? 'Opening Google…' : 'Continue with Google'}</span>
        </button>
      </form>
    </div>
  );
};
