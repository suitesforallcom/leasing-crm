// ─── Router ──────────────────────────────────────────────────────
// Tiny hash-based router. Routes:
//   #/               → floorplan workspace (default)
//   #/rent-roll      → full-screen Rent Roll page
// We deliberately avoid history.pushState to keep the hosting setup simple
// (no server-side rewrite config needed beyond the existing /redesign/** rule).
function useHashRoute() {
  const read = () => {
    const h = (typeof location !== 'undefined' && location.hash) || '';
    const p = h.replace(/^#/, '') || '/';
    return p;
  };
  const [path, setPath] = React.useState(read);
  React.useEffect(() => {
    const onChange = () => setPath(read());
    window.addEventListener('hashchange', onChange);
    return () => window.removeEventListener('hashchange', onChange);
  }, []);
  const navigate = React.useCallback((p) => { location.hash = p; }, []);
  return { path, navigate };
}

// Build full cross-floor unit roster for Rent Roll.
// Columns computed: id, floor, status, tenant, rent, sqft, balance (outstanding
// from all unpaid invoices), lastPaidAt (ms), leaseSignedAt, leaseEndDate, type.
// All figures in dollars (Stripe cents are converted here).
function buildAllUnitRows(LD) {
  if (!LD || !LD.state || !LD.state.buildings || !LD.state.buildings[0]) return [];
  const building = LD.state.buildings[0];
  const floors = building.floors || [];
  const tenantsById = new Map((LD.state.tenants || []).map(t => [t.id, t]));
  const leasesByUnit = new Map();
  for (const l of (LD.state.leases || [])) {
    const cur = leasesByUnit.get(l.unitId);
    if (!cur || (l.updatedAt || 0) > (cur.updatedAt || 0)) leasesByUnit.set(l.unitId, l);
  }
  const invByUnit = {};
  for (const r of (LD.invoices || [])) {
    const uid = r && r.metadata && r.metadata.unitId;
    if (!uid) continue;
    (invByUnit[uid] || (invByUnit[uid] = [])).push(r);
  }
  for (const k of Object.keys(invByUnit)) {
    invByUnit[k].sort((a, b) => (b.created || 0) - (a.created || 0));
  }

  const nowMs = Date.now();
  const dNow = new Date(nowMs);
  const ym = dNow.getUTCFullYear() + '-' + String(dNow.getUTCMonth() + 1).padStart(2, '0');
  const rows = [];

  for (const f of floors) {
    for (const u of (f.units || [])) {
      const type = String(u.type || 'office').toLowerCase();
      if (!(type === 'office' || type === 'suite' || type === 'unit') || u.rentable === false) continue;

      const lease = leasesByUnit.get(u.id) || null;
      const tenantId = u.tenantId || (lease && lease.tenantId);
      const tenantRec = tenantId ? tenantsById.get(tenantId) : null;
      const hasTenant = !!(tenantRec || (u.tenant && u.tenant !== '—') || u.status === 'occupied');
      const tenantName = (tenantRec && tenantRec.name) || u.tenant || (hasTenant ? 'Occupied' : '—');

      const inv = invByUnit[u.id] || [];

      // Status derivation — matches rebuildFromLiveData.
      let status;
      if (!hasTenant) {
        status = 'vacant';
      } else if (lease && lease.envelope && ['sent', 'delivered'].includes(String(lease.envelope.status || '').toLowerCase())) {
        status = 'pending-signature';
      } else {
        const thisMonth = inv.find(r => r.metadata && r.metadata.purpose === 'rent' && r.metadata.ym === ym);
        if (thisMonth) {
          const b = String(thisMonth.bucket || thisMonth.status || '').toLowerCase();
          if (b === 'paid') status = 'paid';
          else if (b === 'void' || b === 'uncollectible') status = 'paid';
          else {
            const due = Number(thisMonth.dueDate || 0);
            status = (due && due < nowMs) ? 'overdue' : 'due';
          }
        } else {
          status = 'paid'; // tenant present but no invoice this month yet → treat as current
        }
      }

      // Outstanding balance across all unpaid invoices (in cents → dollars).
      let balanceCents = 0;
      for (const r of inv) {
        const b = String(r.bucket || r.status || '').toLowerCase();
        if (b !== 'paid' && b !== 'void' && b !== 'uncollectible') {
          balanceCents += Number(r.amountRemaining || r.total || 0);
        }
      }

      // Most recent paid invoice.
      const lastPaid = inv.find(r => String(r.bucket || r.status || '').toLowerCase() === 'paid');
      const lastPaidAt = lastPaid
        ? ((lastPaid.statusTransitions && lastPaid.statusTransitions.paidAt)
          || (lastPaid.created ? lastPaid.created * (lastPaid.created < 1e12 ? 1000 : 1) : null))
        : null;

      rows.push({
        id: u.id,
        floor: f.number,
        floorName: f.name || (f.number + 'th Floor'),
        status,
        tenant: tenantName,
        rent: Number(u.rent || 0),
        sqft: Number(u.sqft || 0),
        balance: balanceCents / 100,
        lastPaidAt,
        leaseSignedAt: lease && lease.signedAt,
        leaseEndDate: lease && (lease.endDate || lease.leaseEnd),
        type: (u.type === 'window') ? 'window' : 'interior',
      });
    }
  }
  return rows;
}

const App = () => {
  // Subscribe to LiveData — any auth, state, or invoice change triggers re-render.
  const [live, setLive] = React.useState(() => ({
    user: window.LiveData?.user || null,
    status: window.LiveData?.status || 'boot',
    state: window.LiveData?.state || null,
    invoices: window.LiveData?.invoices || [],
    invoicesAt: window.LiveData?.invoicesAt || 0,
    authError: window.LiveData?.authError || null,
    lastError: window.LiveData?.lastError || null,
  }));
  const [dataVersion, setDataVersion] = React.useState(0);
  // currentFloor lives at the App level so derived data (liveSuites) can
  // react to it — switching floors in the topbar rebuilds the floorplan.
  const [currentFloor, setCurrentFloor] = React.useState(4);

  React.useEffect(() => {
    if (!window.LiveData) return;
    const apply = () => {
      setLive({
        user: window.LiveData.user,
        status: window.LiveData.status,
        state: window.LiveData.state,
        invoices: window.LiveData.invoices,
        invoicesAt: window.LiveData.invoicesAt,
        authError: window.LiveData.authError,
        lastError: window.LiveData.lastError,
      });
      setDataVersion(v => v + 1);
    };
    apply(); // pick up any state set before mount
    return window.LiveData.subscribe(apply);
  }, []);

  // Derive SUITES/COMMON_AREAS/FLOORS from LiveData for the currently-selected floor.
  const derived = React.useMemo(
    () => window.rebuildFromLiveData(currentFloor),
    [dataVersion, currentFloor]
  );
  const liveSuites = derived.suites;
  const liveCommonAreas = derived.commonAreas;
  const liveFloors = derived.floors;

  // If state loads and the default floor (4) has no rentable units, snap to
  // whichever floor was actually picked by the derivation.
  React.useEffect(() => {
    if (derived.targetFloorId != null && derived.targetFloorId !== currentFloor) {
      setCurrentFloor(derived.targetFloorId);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [derived.targetFloorId]);

  // Gate: if Firebase isn't wired or user not signed in, show sign-in.
  if (live.status === 'boot' || live.status === 'signin' || live.status === 'error' || !live.user) {
    return <SignInScreen live={live}/>;
  }
  // Gate: signed in but data still loading.
  if (live.status === 'loading-state') {
    return <LoadingScreen live={live}/>;
  }
  // Ready — render the full app.
  return <AppInner
    liveSuites={liveSuites}
    liveCommonAreas={liveCommonAreas}
    liveFloors={liveFloors}
    currentFloor={currentFloor}
    setCurrentFloor={setCurrentFloor}
    liveStatus={live.status}
    liveUser={live.user}
    liveInvoicesAt={live.invoicesAt}
  />;
};

const AppInner = ({ liveSuites, liveCommonAreas, liveFloors, currentFloor, setCurrentFloor, liveStatus, liveUser, liveInvoicesAt }) => {
  const { path: route, navigate } = useHashRoute();
  const [tab, setTab] = React.useState("dashboard");
  const [selectedId, setSelectedId] = React.useState(null);
  const [hoveredId, setHoveredId] = React.useState(null);
  const [query, setQuery] = React.useState("");
  const [rail, setRail] = React.useState("overview");
  const [colorMode, setColorMode] = React.useState(TWEAKS.colorMode);
  const [overlays, setOverlays] = React.useState({
    overdue: TWEAKS.showOverdue,
    pendingSignature: TWEAKS.showSignatures,
    newTenant: TWEAKS.showNew,
  });
  const [zoom, setZoom] = React.useState(1);
  const [density, setDensity] = React.useState(TWEAKS.density);
  const [dark, setDark] = React.useState(TWEAKS.dark);
  const [toast, setToast] = React.useState(null);
  const [tweaksOpen, setTweaksOpen] = React.useState(false);

  // Layer toggles — which floorplan elements are visible. Persisted per
  // browser so returning users keep their view. Shape is a flat record of
  // booleans keyed by LAYER_DEFS id.
  const [layers, setLayers] = React.useState(() => {
    try {
      const raw = typeof localStorage !== 'undefined' && localStorage.getItem('__suitesForAllLayers');
      if (raw) {
        const parsed = JSON.parse(raw);
        // Merge against defaults so new layer keys we ship later are picked up.
        return { ...window.DEFAULT_LAYERS, ...parsed };
      }
    } catch (_) { /* storage blocked or corrupt — fall through */ }
    return { ...window.DEFAULT_LAYERS };
  });
  React.useEffect(() => {
    try {
      if (typeof localStorage !== 'undefined') {
        localStorage.setItem('__suitesForAllLayers', JSON.stringify(layers));
      }
    } catch (_) { /* quota or privacy mode — ignore */ }
  }, [layers]);

  // Hook up global color mode toggles from Floorplan
  React.useEffect(() => {
    window.__setColorMode = setColorMode;
    window.__toggleOverlay = (k) => setOverlays(o => ({ ...o, [k]: !o[k] }));
  }, []);

  // Dev-mode gate for the Tweaks panel (internal styling tools). Off by
  // default for end-users; enabled by `localStorage.__suitesForAllDev = "1"`
  // or the `?dev=1` URL flag. The postMessage protocol from the edit-mode
  // host still overrides this when present.
  const isDevUser = React.useMemo(() => {
    try {
      if (typeof location !== 'undefined' && /[?&]dev=1\b/.test(location.search)) return true;
      if (typeof localStorage !== 'undefined' && localStorage.getItem('__suitesForAllDev') === '1') return true;
    } catch (_) { /* storage may be blocked */ }
    return false;
  }, []);

  // Topbar floor pills — derived from the live building so labels and order
  // follow whatever floors actually exist. Falls back to the hardcoded
  // 1st–4th set while data is still loading (keeps the chrome non-empty).
  const topbarFloors = React.useMemo(() => {
    const ordSuffix = (n) => {
      const v = n % 100;
      if (v >= 11 && v <= 13) return 'th';
      switch (n % 10) {
        case 1: return 'st';
        case 2: return 'nd';
        case 3: return 'rd';
        default: return 'th';
      }
    };
    if (!Array.isArray(liveFloors) || !liveFloors.length) {
      return [
        { id: 1, label: '1st' },
        { id: 2, label: '2nd' },
        { id: 3, label: '3rd' },
        { id: 4, label: '4th' },
      ];
    }
    // Preserve numeric order; expose id (floor number) + short label.
    return liveFloors
      .slice()
      .sort((a, b) => (a.id || 0) - (b.id || 0))
      .map(f => ({ id: f.id, label: f.id + ordSuffix(f.id) }));
  }, [liveFloors]);

  // Overdue stats for topbar alert
  const overdueSuites = liveSuites.filter(s => s.status === "overdue");
  const overdueAmount = overdueSuites.reduce((a, s) => a + s.rent, 0);

  const handleSelect = (id) => {
    if (id == null) { setSelectedId(null); return; }
    setSelectedId(id);
    if (tab === "dashboard") setTab("unit");
  };

  const showToast = (msg) => {
    setToast(msg);
    setTimeout(() => setToast(null), 2400);
  };

  const onSendReminder = (s) => showToast(`Reminder sent to ${s.tenant}`);
  const onMessageTenant = (s) => showToast(`Message draft opened for ${s.tenant}`);
  const onMarkPaid = (s) => showToast(`Suite ${s.id} marked as paid`);

  React.useEffect(() => {
    document.body.classList.toggle("dark", dark);
  }, [dark]);

  // Tweaks protocol
  React.useEffect(() => {
    const listener = (e) => {
      if (e.data?.type === "__activate_edit_mode") setTweaksOpen(true);
      if (e.data?.type === "__deactivate_edit_mode") setTweaksOpen(false);
    };
    window.addEventListener("message", listener);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", listener);
  }, []);

  const updateTweak = (key, value) => {
    const next = { ...TWEAKS, [key]: value };
    window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: value } }, "*");
    if (key === "density") setDensity(value);
    if (key === "dark") setDark(value);
    if (key === "colorMode") setColorMode(value);
    if (key === "showOverdue") setOverlays(o => ({ ...o, overdue: value }));
    if (key === "showSignatures") setOverlays(o => ({ ...o, pendingSignature: value }));
    if (key === "showNew") setOverlays(o => ({ ...o, newTenant: value }));
  };

  return (
    <div style={{
      height: "100vh",
      display: "flex", flexDirection: "column",
      background: dark ? "#0F0E0C" : THEME.bg,
    }}>
      <Topbar
        route={route}
        onRouteChange={navigate}
        currentFloor={currentFloor}
        floors={topbarFloors}
        onFloorChange={setCurrentFloor}
        overdueAmount={overdueAmount}
        overdueCount={overdueSuites.length}
        onOpenOverdue={() => { navigate('/'); setTab("dashboard"); setSelectedId(null); }}
        query={query} setQuery={setQuery}
        density={density}
        onToggleDensity={() => setDensity(d => d === "compact" ? "comfortable" : "compact")}
        dark={dark}
        onToggleDark={() => setDark(d => !d)}
      />
      {route === '/rent-roll' ? (
        <RentRollPage
          onOpenUnit={(s) => {
            // Deep-link into the floorplan view with that unit selected.
            navigate('/');
            setCurrentFloor(s.floor);
            setSelectedId(s.id);
            setTab('unit');
          }}
          onSendReminder={onSendReminder}
          onMarkPaid={onMarkPaid}
          liveInvoicesAt={liveInvoicesAt}
        />
      ) : (
        <div style={{ flex: 1, display: "flex", minHeight: 0 }}>
          <LeftRail current={rail} onChange={setRail}/>
          <Floorplan
            suites={liveSuites}
            commonAreas={liveCommonAreas}
            selectedId={selectedId}
            onSelect={handleSelect}
            hoveredId={hoveredId}
            onHover={setHoveredId}
            colorMode={colorMode}
            overlays={overlays}
            zoom={zoom}
            setZoom={setZoom}
            layers={layers}
          />
          <RightPanel
            tab={tab} setTab={setTab}
            suites={liveSuites}
            floors={liveFloors}
            currentFloor={currentFloor}
            selectedId={selectedId}
            onSelect={handleSelect}
            onSendReminder={onSendReminder}
            onMessageTenant={onMessageTenant}
            onMarkPaid={onMarkPaid}
            messageToast={toast}
            layers={layers}
            setLayers={setLayers}
          />
        </div>
      )}

      {tweaksOpen && isDevUser && (
        <TweaksPanel
          values={{ density, dark, colorMode, overlays }}
          update={updateTweak}
          onClose={() => setTweaksOpen(false)}
        />
      )}
    </div>
  );
};

// ─── Rent Roll page ──────────────────────────────────────────────────
// Full-screen table view of every rentable unit across every floor.
// Columns: Suite · Floor · Status · Tenant · Monthly rent · Last paid · Balance.
// Filters: status, floor, search (tenant name / suite id).
// Row click deep-links back into the floorplan view with that unit selected.
//
// Data source: window.LiveData.state.buildings[0].floors[].units[] joined with
// tenants + leases + Stripe invoices via buildAllUnitRows(). Re-runs whenever
// liveInvoicesAt changes.
const RentRollPage = ({ onOpenUnit, onSendReminder, onMarkPaid, liveInvoicesAt }) => {
  const [statusFilter, setStatusFilter] = React.useState('all');
  const [floorFilter, setFloorFilter] = React.useState('all');
  const [search, setSearch] = React.useState('');
  const [sortKey, setSortKey] = React.useState('id');
  const [sortDir, setSortDir] = React.useState('asc');

  // Recompute rows whenever invoices or state change.
  const allRows = React.useMemo(
    () => buildAllUnitRows(window.LiveData),
    [liveInvoicesAt]
  );

  const floors = React.useMemo(() => {
    const s = new Set();
    for (const r of allRows) s.add(r.floor);
    return Array.from(s).sort((a, b) => a - b);
  }, [allRows]);

  // Apply filters + search + sort.
  const rows = React.useMemo(() => {
    const q = search.trim().toLowerCase();
    let out = allRows.filter(r => {
      if (statusFilter !== 'all' && r.status !== statusFilter) return false;
      if (floorFilter !== 'all' && r.floor !== floorFilter) return false;
      if (q && !(String(r.id).toLowerCase().includes(q) || String(r.tenant).toLowerCase().includes(q))) return false;
      return true;
    });
    out = out.slice().sort((a, b) => {
      const av = a[sortKey]; const bv = b[sortKey];
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === 'number' && typeof bv === 'number') return sortDir === 'asc' ? av - bv : bv - av;
      return sortDir === 'asc' ? String(av).localeCompare(String(bv)) : String(bv).localeCompare(String(av));
    });
    return out;
  }, [allRows, statusFilter, floorFilter, search, sortKey, sortDir]);

  // Summary stats below the filter bar.
  const totals = React.useMemo(() => {
    let rent = 0, balance = 0;
    const counts = { paid: 0, due: 0, overdue: 0, 'pending-signature': 0, vacant: 0 };
    for (const r of rows) {
      rent += r.rent;
      balance += r.balance;
      counts[r.status] = (counts[r.status] || 0) + 1;
    }
    return { rent, balance, counts };
  }, [rows]);

  const toggleSort = (key) => {
    if (sortKey === key) setSortDir(d => d === 'asc' ? 'desc' : 'asc');
    else { setSortKey(key); setSortDir('asc'); }
  };

  const exportCSV = () => {
    const header = ['Suite','Floor','Status','Tenant','MonthlyRent','LastPaid','Balance','LeaseStart','LeaseEnd','Type'];
    const lines = [header.join(',')];
    for (const r of rows) {
      const lp = r.lastPaidAt ? new Date(r.lastPaidAt).toISOString().slice(0,10) : '';
      const ls = r.leaseSignedAt ? new Date(r.leaseSignedAt).toISOString().slice(0,10) : '';
      const le = r.leaseEndDate ? new Date(r.leaseEndDate).toISOString().slice(0,10) : '';
      const tenant = '"' + String(r.tenant || '').replace(/"/g, '""') + '"';
      lines.push([r.id, r.floor, r.status, tenant, r.rent, lp, r.balance.toFixed(2), ls, le, r.type].join(','));
    }
    const blob = new Blob([lines.join('\n')], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'rent-roll-' + new Date().toISOString().slice(0,10) + '.csv';
    a.click();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  };

  return (
    <div style={rentRollStyles.root}>
      {/* Filter bar */}
      <div style={rentRollStyles.filterBar}>
        <input
          type="text"
          value={search}
          onChange={e => setSearch(e.target.value)}
          placeholder="Search suite or tenant…"
          style={rentRollStyles.search}
        />
        <select
          value={statusFilter}
          onChange={e => setStatusFilter(e.target.value)}
          style={rentRollStyles.select}
        >
          <option value="all">All statuses</option>
          <option value="paid">Paid</option>
          <option value="due">Due</option>
          <option value="overdue">Overdue</option>
          <option value="pending-signature">Pending signature</option>
          <option value="vacant">Vacant</option>
        </select>
        <select
          value={floorFilter}
          onChange={e => setFloorFilter(e.target.value === 'all' ? 'all' : Number(e.target.value))}
          style={rentRollStyles.select}
        >
          <option value="all">All floors</option>
          {floors.map(f => <option key={f} value={f}>{f} Floor</option>)}
        </select>
        <div style={{ flex: 1 }}/>
        <button onClick={exportCSV} style={rentRollStyles.exportBtn}>
          <Icon name="file" size={12}/>
          <span>Export CSV</span>
        </button>
      </div>

      {/* Summary strip */}
      <div style={rentRollStyles.summary}>
        <span><strong style={{ color: THEME.ink }}>{rows.length}</strong> units</span>
        <span>·</span>
        <span><strong style={{ color: THEME.ink }}>{fmt$(totals.rent)}</strong> monthly rent</span>
        {totals.balance > 0 && (<>
          <span>·</span>
          <span style={{ color: THEME.overdue }}>
            <strong>{fmt$(totals.balance)}</strong> outstanding
          </span>
        </>)}
        <span style={{ marginLeft: 'auto', display: 'flex', gap: 12 }}>
          {totals.counts.overdue > 0 && <span style={{ color: THEME.overdue }}>{totals.counts.overdue} overdue</span>}
          {totals.counts.due > 0 && <span style={{ color: THEME.due }}>{totals.counts.due} due</span>}
          {totals.counts['pending-signature'] > 0 && <span style={{ color: THEME.pending }}>{totals.counts['pending-signature']} pending</span>}
          {totals.counts.vacant > 0 && <span style={{ color: THEME.inkMuted }}>{totals.counts.vacant} vacant</span>}
        </span>
      </div>

      {/* Table */}
      <div style={rentRollStyles.tableWrap}>
        <table style={rentRollStyles.table}>
          <thead>
            <tr>
              <RRHeader label="Suite" col="id" sortKey={sortKey} sortDir={sortDir} onClick={toggleSort} align="left"/>
              <RRHeader label="Floor" col="floor" sortKey={sortKey} sortDir={sortDir} onClick={toggleSort} align="left"/>
              <RRHeader label="Status" col="status" sortKey={sortKey} sortDir={sortDir} onClick={toggleSort} align="left"/>
              <RRHeader label="Tenant" col="tenant" sortKey={sortKey} sortDir={sortDir} onClick={toggleSort} align="left"/>
              <RRHeader label="Rent" col="rent" sortKey={sortKey} sortDir={sortDir} onClick={toggleSort} align="right"/>
              <RRHeader label="Last paid" col="lastPaidAt" sortKey={sortKey} sortDir={sortDir} onClick={toggleSort} align="left"/>
              <RRHeader label="Balance" col="balance" sortKey={sortKey} sortDir={sortDir} onClick={toggleSort} align="right"/>
              <th style={{ ...rentRollStyles.th, textAlign: 'right', cursor: 'default' }}>Actions</th>
            </tr>
          </thead>
          <tbody>
            {rows.length === 0 && (
              <tr><td colSpan={8} style={rentRollStyles.emptyCell}>No units match these filters.</td></tr>
            )}
            {rows.map(r => (
              <tr key={r.id} style={rentRollStyles.tr} onClick={() => onOpenUnit(r)}>
                <td style={{ ...rentRollStyles.td, fontWeight: 600, color: THEME.ink }}>{r.id}</td>
                <td style={rentRollStyles.td}>{r.floorName}</td>
                <td style={rentRollStyles.td}><StatusPill status={r.status}/></td>
                <td style={{ ...rentRollStyles.td, color: r.tenant === '—' ? THEME.inkSubtle : THEME.ink }}>{r.tenant}</td>
                <td style={{ ...rentRollStyles.td, textAlign: 'right', fontVariantNumeric: 'tabular-nums' }}>{r.rent ? fmt$(r.rent) : '—'}</td>
                <td style={rentRollStyles.td}>{r.lastPaidAt ? formatDate(r.lastPaidAt) : '—'}</td>
                <td style={{
                  ...rentRollStyles.td,
                  textAlign: 'right',
                  fontVariantNumeric: 'tabular-nums',
                  color: r.balance > 0 ? THEME.overdue : THEME.inkSubtle,
                  fontWeight: r.balance > 0 ? 600 : 400,
                }}>{r.balance > 0 ? fmt$(r.balance) : '—'}</td>
                <td style={{ ...rentRollStyles.td, textAlign: 'right' }} onClick={e => e.stopPropagation()}>
                  {(r.status === 'overdue' || r.status === 'due') && (
                    <button style={rentRollStyles.rowBtn} onClick={() => onSendReminder(r)}>Remind</button>
                  )}
                </td>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// Friendly short date — "Apr 3", or "Apr 3, 2025" if > 9 months ago.
function formatDate(ms) {
  if (!ms) return '—';
  const d = new Date(ms);
  if (isNaN(d)) return '—';
  const M = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  const sameYear = d.getUTCFullYear() === now.getUTCFullYear();
  return sameYear
    ? `${M[d.getUTCMonth()]} ${d.getUTCDate()}`
    : `${M[d.getUTCMonth()]} ${d.getUTCDate()}, ${d.getUTCFullYear()}`;
}

    >

      {active && <span style={{ marginLeft: 4, fontSize: 10 }}>{sortDir === 'asc' ? '▲' : '▼'}</span>}
    </th>
  );
};
