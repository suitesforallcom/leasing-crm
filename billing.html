const genInvoices = () => {
  const inv = [];
  let id = 40120;
  const statuses = ['paid','paid','paid','paid','paid','paid','paid','paid','due','open','open','overdue','overdue','draft','void'];
  for (let m = 0; m < 4; m++) {
    for (const t of TENANTS) {
      const issued = new Date(2026, 3 - m, 1);
      const due = new Date(2026, 3 - m, 15);
      const st = m === 0 ? (t.status === 'overdue' ? 'overdue' : t.status === 'due' ? 'open' : 'paid') : pick(statuses);
      const paid = st === 'paid' ? t.mrr : st === 'partial' ? Math.round(t.mrr * 0.6 / 50) * 50 : 0;
      inv.push({
        id: `INV-${id++}`,
        tenantId: t.id, tenant: t.name, co: t.co, email: t.email,
        suite: t.suite, bname: t.bname,
        total: t.mrr, paid, remaining: t.mrr - paid,
        status: st, issued, due,
        stripe: st === 'paid' ? 'stripe' : st === 'void' ? null : 'stripe',
      });
    }
  }
  return inv.sort((a, b) => b.issued - a.issued);
};

  const start = new Date(2021 + rnd(0, 4), rnd(0, 11), 1 + rnd(0, 27));
  const end = new Date(start.getFullYear() + Math.floor(ty / 12), start.getMonth() + (ty % 12), start.getDate());
  const daysLeft = Math.round((end - new Date()) / 86400000);
  return {
    id: `LSE-${2100 + i}`,
    tenant: t.name, co: t.co, suite: t.suite, bname: t.bname,
    rent: t.mrr, start, end, term: ty, daysLeft,

};

const Spark = ({ data }) => {
  const max = Math.max(...data), min = Math.min(...data), range = max - min || 1;
  const w = 160, h = 36;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * h}`);
  return (
    <svg width={w} height={h} style={{ display: 'block' }}>
      <polyline points={pts.join(' ')} fill="none" stroke={C.accent} strokeWidth={1.5} />
      <circle cx={pts[pts.length - 1].split(',')[0]} cy={pts[pts.length - 1].split(',')[1]} r={3} fill={C.accent} />
    </svg>
  );
};

// -------- AGING --------
const AgingPanel = () => {
  const now = new Date();
  const buckets = { current: [], b30: [], b60: [], b90: [], b120: [] };
  INVOICES.filter((i) => ['open','due','overdue','partial'].includes(i.status)).forEach((i) => {
    const d = Math.floor((now - i.due) / 86400000);
    if (d <= 0) buckets.current.push(i);
    else if (d <= 30) buckets.b30.push(i);
    else if (d <= 60) buckets.b60.push(i);
    else if (d <= 90) buckets.b90.push(i);
    else buckets.b120.push(i);
  });

  const sum = (arr) => arr.reduce((a, i) => a + i.remaining, 0);
  const totals = {
    current: sum(buckets.current),
    b30: sum(buckets.b30), b60: sum(buckets.b60),
    b90: sum(buckets.b90), b120: sum(buckets.b120),
  };
  const grandTotal = Object.values(totals).reduce((a, b) => a + b, 0);

  const bkts = [
    { k: 'current', l: 'Current', sub: 'Not yet due', v: totals.current, n: buckets.current.length, c: C.paid, wash: C.paidWash },
    { k: 'b30', l: '1–30 days', sub: 'Approaching', v: totals.b30, n: buckets.b30.length, c: C.due, wash: C.dueWash },
    { k: 'b60', l: '31–60 days', sub: 'Follow up', v: totals.b60, n: buckets.b60.length, c: C.overdue, wash: C.overdueWash },
    { k: 'b90', l: '61–90 days', sub: 'Escalate', v: totals.b90, n: buckets.b90.length, c: C.overdue, wash: C.overdueWash },
    { k: 'b120', l: '90+ days', sub: 'Collections', v: totals.b120, n: buckets.b120.length, c: C.ink, wash: C.paper3 },
  ];

  // By-tenant aging breakdown
  const byTenant = {};
  [...buckets.current, ...buckets.b30, ...buckets.b60, ...buckets.b90, ...buckets.b120].forEach((inv) => {
    if (!byTenant[inv.tenantId]) byTenant[inv.tenantId] = { tenant: inv.tenant, co: inv.co, suite: inv.suite, current: 0, b30: 0, b60: 0, b90: 0, b120: 0, total: 0 };
    const d = Math.floor((now - inv.due) / 86400000);
    const k = d <= 0 ? 'current' : d <= 30 ? 'b30' : d <= 60 ? 'b60' : d <= 90 ? 'b90' : 'b120';
    byTenant[inv.tenantId][k] += inv.remaining;
    byTenant[inv.tenantId].total += inv.remaining;
  });
  const tenantRows = Object.values(byTenant).sort((a, b) => b.total - a.total).slice(0, 10);

  return (
    <div style={{ padding: 24 }}>
      {/* Bucket cards */}
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(180px, 1fr))', gap: 12, marginBottom: 24 }}>
        {bkts.map((b) => (
          <div key={b.k} style={{
            background: C.surface, border: `1px solid ${C.line}`, borderRadius: 8,
            padding: 18, position: 'relative', overflow: 'hidden',
          }}>
            <div style={{ position: 'absolute', top: 0, left: 0, bottom: 0, width: 3, background: b.c }} />
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: 0.8, textTransform: 'uppercase', color: C.ink5, marginBottom: 6 }}>{b.l}</div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 32, fontWeight: 400, letterSpacing: -0.8, lineHeight: 1, color: b.c }} className="tab">{fmt$(b.v, true)}</div>
            <div style={{ fontSize: 11.5, color: C.ink5, marginTop: 6, display: 'flex', justifyContent: 'space-between' }}>
              <span>{b.n} invoice{b.n !== 1 ? 's' : ''}</span>
              <span className="tab">{grandTotal ? Math.round((b.v / grandTotal) * 100) : 0}%</span>
            </div>
          </div>
        ))}
      </div>

      {/* Aging bar */}
      <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 8, padding: 20, marginBottom: 24 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 12 }}>
          <div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: 0.8, textTransform: 'uppercase', color: C.ink5, marginBottom: 4 }}>Total A/R</div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 42, fontWeight: 400, letterSpacing: -1, lineHeight: 1 }} className="tab">{fmt$(grandTotal)}</div>
          </div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: 0.8, textTransform: 'uppercase', color: C.ink5, marginBottom: 4 }}>Collection rate</div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 42, fontWeight: 400, letterSpacing: -1, lineHeight: 1, color: C.paid }} className="tab">94.2%</div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 2, height: 44, borderRadius: 4, overflow: 'hidden' }}>

          <Btn size="sm" icon={<Icon n="download" s={14} />}>Export A/R</Btn>
        </div>
      </div>

      <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 8, overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr>
              <TH>Tenant</TH>
              <TH w={90}>Suite</TH>
              <TH w={110} align="right">Current</TH>
              <TH w={110} align="right">1–30</TH>
              <TH w={110} align="right">31–60</TH>
              <TH w={110} align="right">61–90</TH>
              <TH w={110} align="right">90+</TH>
              <TH w={120} align="right">Total</TH>
              <TH w={90} />
            </tr>
          </thead>
          <tbody>
            {tenantRows.map((r, i) => (
              <tr key={i}>

                <TD align="right"><Btn size="sm" icon={<Icon n="mail" s={13} />}>Nudge</Btn></TD>

        <div style={{ display: 'flex', justifyContent: 'space-between', marginBottom: 14, alignItems: 'center' }}>
          <div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: 0.8, textTransform: 'uppercase', color: C.ink5 }}>Expiration timeline</div>
            <div style={{ fontSize: 15, fontWeight: 500, marginTop: 2 }}>Next 12 months · {LEASES.filter(l => l.daysLeft > 0 && l.daysLeft < 365).length} renewals upcoming</div>
          </div>
          <Btn size="sm" icon={<Icon n="calendar" s={14} />}>View calendar</Btn>
        </div>
        <div style={{ position: 'relative', paddingTop: 8 }}>
          <div style={{ display: 'flex', height: 60, position: 'relative' }}>
            {Array.from({ length: 12 }).map((_, m) => (
              <div key={m} style={{ flex: 1, borderLeft: `1px solid ${m === 0 ? C.line2 : C.line}`, position: 'relative' }}>
                <div style={{ position: 'absolute', top: -20, left: 4, fontSize: 10.5, fontFamily: 'var(--mono)', color: C.ink5, letterSpacing: 0.4 }}>
                  {new Date(2026, 3 + m, 1).toLocaleDateString('en-US', { month: 'short' })}
                </div>
              </div>
            ))}
            {LEASES.filter(l => l.daysLeft > 0 && l.daysLeft < 365).map((l) => {
              const pos = (l.daysLeft / 365) * 100;
              const c = l.daysLeft < 60 ? C.overdue : l.daysLeft < 180 ? C.due : C.paid;
              return (
                <div key={l.id} style={{
                  position: 'absolute', top: 10, left: `${pos}%`,
                  transform: 'translateX(-50%)', cursor: 'pointer',
                }} title={`${l.tenant} · expires ${fmtDate(l.end)}`}>
                  <div style={{ width: 2, height: 40, background: c, margin: '0 auto' }} />
                  <div style={{
                    fontSize: 10, fontFamily: 'var(--mono)', color: c,
                    whiteSpace: 'nowrap', transform: 'rotate(-35deg)', transformOrigin: 'left top',
                    marginTop: 2, marginLeft: 6, letterSpacing: 0.2,
                  }}>{l.tenant.split(' ')[0]}</div>
                </div>
              );
            })}
          </div>
        </div>
      </div>

      {/* Table */}
      <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 8, overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr>
              <TH w={110}>Lease ID</TH>
              <TH>Tenant</TH>
              <TH w={110}>Suite</TH>
              <TH w={120}>Start</TH>
              <TH w={120}>End</TH>
              <TH w={90} align="right">Days left</TH>
              <TH w={100} align="right">Rent</TH>
              <TH w={130}>Signature</TH>
              <TH w={100}>Status</TH>
              <TH w={80} />
            </tr>
          </thead>
          <tbody>
            {LEASES.map((l) => (
              <tr key={l.id}>
                <TD mono bold size={12.5}>{l.id}</TD>
                <TD>
                  <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                    <Avatar name={l.tenant} size={28} />
                    <div>
                      <div style={{ fontWeight: 500 }}>{l.tenant}</div>
                      <div style={{ fontSize: 11, color: C.ink5 }}>{l.co}</div>
                    </div>
                  </div>
                </TD>
                <TD size={12.5} mono color={C.ink4}>
                  <div style={{ fontWeight: 500, color: C.ink3 }}>{l.suite}</div>
                  <div style={{ fontSize: 11, color: C.ink5, fontFamily: 'var(--sans)' }}>{l.bname}</div>
                </TD>
                <TD mono size={12.5} color={C.ink4}>{fmtDate(l.start)}</TD>
                <TD mono size={12.5} color={C.ink4}>
                  {fmtDate(l.end)}
                  <div style={{ fontSize: 10.5, color: C.ink5 }}>{l.term}mo term</div>
                </TD>
                <TD align="right" mono color={l.daysLeft < 60 ? C.overdue : l.daysLeft < 180 ? C.due : C.ink}>
                  <span className="tab" style={{ fontWeight: 500 }}>{l.daysLeft > 0 ? l.daysLeft : 'expired'}</span>
                </TD>
                <TD align="right" mono bold><span className="tab">{fmt$(l.rent)}</span></TD>
                <TD><Pill status={l.signed} /></TD>
                <TD><Pill status={l.status} /></TD>
                <TD align="right"><Btn size="sm" variant="ghost" icon={<Icon n="more" s={14} />} /></TD>
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
};

// -------- CONTRACTS --------
const ContractsPanel = () => {
  const total = CONTRACTS.reduce((a, c) => a + (c.period === 'Monthly' ? c.amount * 12 : c.period === 'Quarterly' ? c.amount * 4 : c.amount), 0);
  return (
    <div style={{ padding: 24 }}>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(200px, 1fr))', gap: 12, marginBottom: 20 }}>
        <StatCard label="Annualized spend" value={fmt$(total)} sub={`${CONTRACTS.length} active contracts`} accent />
        <StatCard label="Monthly recurring" value={fmt$(CONTRACTS.filter(c => c.period === 'Monthly').reduce((a, c) => a + c.amount, 0))} sub="Utilities + services" />
        <StatCard label="Renewals ≤ 60d" value={CONTRACTS.filter(c => c.status === 'pending').length} sub="Review & renew" />
        <StatCard label="Vendors" value={new Set(CONTRACTS.map(c => c.vendor)).size} sub="Active partners" />
      </div>

      <div style={{ display: 'flex', gap: 12, marginBottom: 16, alignItems: 'center' }}>
        <SearchField placeholder="Search vendor, contract…" />
        <Btn size="sm" iconRight={<Icon n="chevron" s={12} />}>All types</Btn>
        <Btn size="sm" iconRight={<Icon n="chevron" s={12} />}>All status</Btn>
        <div style={{ flex: 1 }} />
        <Btn size="sm" icon={<Icon n="download" s={14} />}>Export</Btn>
        <Btn size="sm" variant="primary" icon={<Icon n="plus" s={14} />}>Add contract</Btn>
      </div>

      <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 8, overflow: 'hidden' }}>
        <table style={{ width: '100%', borderCollapse: 'collapse', fontSize: 13 }}>
          <thead>
            <tr>
              <TH w={110}>Contract</TH>
              <TH>Vendor</TH>
              <TH w={120}>Type</TH>
              <TH w={110}>Period</TH>
              <TH w={110} align="right">Amount</TH>
              <TH w={120}>Start</TH>
              <TH w={120}>End</TH>
              <TH w={130}>Next payment</TH>
              <TH w={100}>Status</TH>
              <TH w={60} />
            </tr>
          </thead>
          <tbody>
            {CONTRACTS.map((c) => {
              const typeColors = { Service: C.accent, Utility: C.due, Insurance: C.paid, Maintenance: C.reserved, Legal: C.pending };
              const tc = typeColors[c.type] || C.ink4;
              return (
                <tr key={c.id}>
                  <TD mono bold size={12.5}>{c.id}</TD>
                  <TD bold>{c.vendor}</TD>
                  <TD>
                    <span style={{
                      display: 'inline-flex', alignItems: 'center', gap: 6, padding: '3px 8px',
                      background: `${tc}1a`, color: tc, borderRadius: 4, fontSize: 11.5, fontWeight: 500,
                    }}>
                      <span style={{ width: 5, height: 5, borderRadius: 3, background: tc }} />
                      {c.type}
                    </span>
                  </TD>
                  <TD size={12.5} color={C.ink4}>{c.period}</TD>
                  <TD align="right" mono bold><span className="tab">{fmt$(c.amount)}</span></TD>
                  <TD mono size={12.5} color={C.ink4}>{c.start}</TD>
                  <TD mono size={12.5} color={C.ink4}>{c.end}</TD>
                  <TD mono size={12.5} color={c.nextPay.includes('Renewal') ? C.overdue : C.ink3}>
                    {c.nextPay.includes('Renewal') ? (
                      <span style={{ color: C.overdue, fontWeight: 500 }}>{c.nextPay}</span>
                    ) : c.nextPay}
                  </TD>
                  <TD><Pill status={c.status} /></TD>
                  <TD align="right"><Btn size="sm" variant="ghost" icon={<Icon n="more" s={14} />} /></TD>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
};

const StatCard = ({ label, value, sub, accent }) => (
  <div style={{ background: C.surface, border: `1px solid ${C.line}`, borderRadius: 8, padding: 18 }}>
    <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: 0.8, textTransform: 'uppercase', color: C.ink5, marginBottom: 8 }}>{label}</div>
    <div style={{ fontFamily: 'var(--serif)', fontSize: 32, fontWeight: 400, letterSpacing: -0.8, lineHeight: 1, color: accent ? C.accent : C.ink }} className="tab">{value}</div>
    <div style={{ fontSize: 11.5, color: C.ink5, marginTop: 8 }}>{sub}</div>
  </div>
);

// ═══ SEARCH FIELD ═══
const SearchField = ({ placeholder }) => {
  const [v, setV] = React.useState('');
  return (
    <div style={{
      display: 'flex', alignItems: 'center', gap: 8,
      height: 32, padding: '0 12px', background: C.paper,
      border: `1px solid ${C.line}`, borderRadius: 6, minWidth: 240, maxWidth: 340, flex: '1 1 260px',
    }}>
      <Icon n="search" s={14} />
      <input value={v} onChange={(e) => setV(e.target.value)} placeholder={placeholder}
        style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 13 }} />
      {v && <button onClick={() => setV('')} style={{ border: 'none', background: 'transparent', cursor: 'pointer', color: C.ink5, padding: 2, display: 'flex' }}><Icon n="x" s={13} /></button>}
    </div>
  );
};

// ═══ CREATE INVOICE MODAL ═══
const CreateInvoiceModal = ({ open, onClose }) => {
  if (!open) return null;
  const [tenant, setTenant] = React.useState(TENANTS[0].id);
  const t = TENANTS.find((x) => x.id === tenant);

  const lineItems = [
    { desc: `April rent — Suite ${t.suite}`, qty: 1, rate: t.mrr, amount: t.mrr },
    { desc: 'CAM charges', qty: 1, rate: 240, amount: 240 },
  ];
  const subtotal = lineItems.reduce((a, l) => a + l.amount, 0);
  const tax = Math.round(subtotal * 0.07);
  const total = subtotal + tax;

  return (
    <>
      <div onClick={onClose} style={{ position: 'fixed', inset: 0, background: 'rgba(26,24,21,0.35)', zIndex: 100 }} />
      <div style={{
        position: 'fixed', top: '50%', left: '50%', transform: 'translate(-50%, -50%)',
        width: 'min(720px, 92vw)', maxHeight: '88vh',
        background: C.surface, borderRadius: 10, boxShadow: '0 20px 80px rgba(40,30,20,0.2)',
        zIndex: 101, display: 'flex', flexDirection: 'column',
      }}>
        <div style={{ padding: '20px 24px', borderBottom: `1px solid ${C.line}`, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: C.ink5, letterSpacing: 0.6, textTransform: 'uppercase', marginBottom: 4 }}>New invoice</div>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 28, letterSpacing: -0.6, lineHeight: 1 }}>Draft invoice</div>
          </div>
          <button onClick={onClose} style={{ border: 'none', background: 'transparent', cursor: 'pointer', width: 32, height: 32, borderRadius: 16, color: C.ink4, display: 'flex', alignItems: 'center', justifyContent: 'center' }}><Icon n="x" s={18} /></button>
        </div>

        <div style={{ flex: 1, overflow: 'auto', padding: 24 }}>
          {/* Tenant + suite */}
          <div style={{ display: 'grid', gridTemplateColumns: '2fr 1fr', gap: 16, marginBottom: 20 }}>
            <Field label="Tenant">
              <div style={{
                display: 'flex', alignItems: 'center', gap: 10,
                height: 44, padding: '0 12px', background: C.paper,
                border: `1px solid ${C.line2}`, borderRadius: 6,
              }}>
                <Avatar name={t.name} size={28} />
                <div style={{ flex: 1 }}>
                  <div style={{ fontSize: 13.5, fontWeight: 500 }}>{t.name}</div>
                  <div style={{ fontSize: 11.5, color: C.ink5 }}>{t.email}</div>
                </div>
                <Icon n="chevron" s={14} />
              </div>
            </Field>
            <Field label="Suite">
              <div style={{
                display: 'flex', alignItems: 'center',
                height: 44, padding: '0 12px', background: C.paper,
                border: `1px solid ${C.line2}`, borderRadius: 6,
                fontFamily: 'var(--mono)', fontSize: 14, fontWeight: 500,
              }}>{t.suite} · {t.bname}</div>
            </Field>
          </div>

          {/* Dates */}
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 16, marginBottom: 20 }}>
            <Field label="Issue date"><TextInput value="Apr 15, 2026" icon="calendar" /></Field>
            <Field label="Due date"><TextInput value="May 1, 2026" icon="calendar" /></Field>
            <Field label="Invoice #"><TextInput value="INV-40145" mono /></Field>
          </div>

          {/* Line items */}
          <div style={{ marginBottom: 16 }}>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: 0.8, textTransform: 'uppercase', color: C.ink5, marginBottom: 10 }}>Line items</div>
            <div style={{ background: C.paper, border: `1px solid ${C.line}`, borderRadius: 6, overflow: 'hidden' }}>
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 70px 100px 120px 36px', padding: '10px 12px', background: C.paper2, borderBottom: `1px solid ${C.line}`, fontFamily: 'var(--mono)', fontSize: 10, color: C.ink5, letterSpacing: 0.5, textTransform: 'uppercase' }}>
                <div>Description</div><div style={{ textAlign: 'right' }}>Qty</div><div style={{ textAlign: 'right' }}>Rate</div><div style={{ textAlign: 'right' }}>Amount</div><div />
              </div>
              {lineItems.map((li, i) => (
                <div key={i} style={{ display: 'grid', gridTemplateColumns: '1fr 70px 100px 120px 36px', padding: '12px', borderBottom: i < lineItems.length - 1 ? `1px solid ${C.line}` : 'none', alignItems: 'center', fontSize: 13 }}>
                  <div>{li.desc}</div>
                  <div style={{ textAlign: 'right', fontFamily: 'var(--mono)' }} className="tab">{li.qty}</div>
                  <div style={{ textAlign: 'right', fontFamily: 'var(--mono)' }} className="tab">{fmt$(li.rate)}</div>
                  <div style={{ textAlign: 'right', fontFamily: 'var(--mono)', fontWeight: 500 }} className="tab">{fmt$(li.amount)}</div>
                  <div style={{ textAlign: 'center', color: C.ink5, cursor: 'pointer' }}><Icon n="x" s={13} /></div>
                </div>
              ))}
              <div style={{ padding: '8px 12px', background: C.paper2 }}>
                <button style={{
                  border: 'none', background: 'transparent', cursor: 'pointer', color: C.accent,
                  fontSize: 12.5, fontWeight: 500, display: 'inline-flex', alignItems: 'center', gap: 4, padding: '4px 0',
                }}><Icon n="plus" s={12} /> Add line item</button>
              </div>
            </div>
          </div>

          {/* Totals */}
          <div style={{ display: 'flex', justifyContent: 'flex-end', marginBottom: 16 }}>
            <div style={{ width: 280 }}>
              <TotalRow label="Subtotal" value={subtotal} />
              <TotalRow label="Tax (7%)" value={tax} />
              <div style={{ borderTop: `1px solid ${C.line2}`, marginTop: 6, paddingTop: 10 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'baseline' }}>
                  <div style={{ fontSize: 13, fontWeight: 500 }}>Total</div>
                  <div style={{ fontFamily: 'var(--serif)', fontSize: 32, letterSpacing: -0.8, lineHeight: 1 }} className="tab">{fmt$(total)}</div>
                </div>
              </div>
            </div>
          </div>

          {/* Payment */}
          <div style={{ padding: 14, background: C.accentWash, border: `1px solid ${C.accent}22`, borderRadius: 6, display: 'flex', gap: 10, alignItems: 'center' }}>
            <Icon n="stripe" s={18} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 13, fontWeight: 500, color: C.accent }}>Stripe payment link included</div>
              <div style={{ fontSize: 11.5, color: C.ink4, marginTop: 2 }}>Tenant can pay by card or ACH. Auto-reconciles on payment.</div>
            </div>
            <label style={{ display: 'flex', alignItems: 'center', gap: 6, fontSize: 12, color: C.ink3, cursor: 'pointer' }}>
              <input type="checkbox" defaultChecked style={{ accentColor: C.accent }} /> Enable
            </label>
          </div>
        </div>

        <div style={{ padding: '16px 24px', borderTop: `1px solid ${C.line}`, background: C.paper2, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <div style={{ fontSize: 12, color: C.ink5 }}>Save as draft or send directly — tenant receives email with PDF + pay link.</div>
          <div style={{ display: 'flex', gap: 8 }}>
            <Btn variant="ghost" onClick={onClose}>Cancel</Btn>
            <Btn variant="secondary">Save draft</Btn>
            <Btn variant="primary" icon={<Icon n="mail" s={14} />}>Send invoice</Btn>
          </div>
        </div>
      </div>
    </>
  );
};

const Field = ({ label, children }) => (
  <div>
    <div style={{ fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: 0.8, textTransform: 'uppercase', color: C.ink5, marginBottom: 6 }}>{label}</div>
    {children}
  </div>
);

const TextInput = ({ value, icon, mono }) => (
  <div style={{
    display: 'flex', alignItems: 'center', gap: 8,
    height: 44, padding: '0 12px', background: C.paper,
    border: `1px solid ${C.line2}`, borderRadius: 6,
  }}>
    {icon && <Icon n={icon} s={15} />}
    <input defaultValue={value} style={{ flex: 1, border: 'none', outline: 'none', background: 'transparent', fontSize: 13.5, fontFamily: mono ? 'var(--mono)' : undefined, fontWeight: 500 }} />
  </div>
);

const TotalRow = ({ label, value }) => (
  <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 13, padding: '6px 0', color: C.ink3 }}>
    <div>{label}</div>
    <div style={{ fontFamily: 'var(--mono)' }} className="tab">{fmt$(value)}</div>
  </div>
);

// ═══ APP ═══
const App = () => {
  const [tab, setTab] = React.useState('invoices');
  const [modalOpen, setModalOpen] = React.useState(false);

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh', background: C.paper }}>
      <Topbar />
      <div style={{ flex: 1, display: 'flex', minHeight: 0 }}>
        <Rail />
        <div style={{ flex: 1, display: 'flex', flexDirection: 'column', minWidth: 0, overflow: 'auto' }}>
          <PageHeader onCreateInvoice={() => setModalOpen(true)} />
          <KPIStrip />
          <Tabs active={tab} setActive={setTab} />
          {tab === 'tenants' && <TenantsPanel onSelect={() => {}} />}
          {tab === 'invoices' && <InvoicesPanel />}
          {tab === 'aging' && <AgingPanel />}
          {tab === 'leases' && <LeasesPanel />}
          {tab === 'contracts' && <ContractsPanel />}
        </div>
      </div>
      <CreateInvoiceModal open={modalOpen} onClose={() => setModalOpen(false)} />
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
