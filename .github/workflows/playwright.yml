# Playwright smoke tests — запускается на каждый push в main и в feature/*.
# Проверяет что прод (https://suitesforall.web.app) грузится, auth-gate
# работает, статические страницы возвращают 200.
#
# Время прогона ~30 секунд. GitHub Actions free tier 2000 мин/мес —
# легко укладываемся.
#
# Создан 2026-05-06.

name: Playwright smoke

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]
  # Ручной запуск из UI Actions tab.
  workflow_dispatch:

jobs:
  smoke:
    name: Smoke tests against production
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: ./tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tests/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: npx playwright test
        env:
          CI: 'true'

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: tests/playwright-report/
          retention-days: 14
