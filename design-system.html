<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SuitesForAll · Design System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  :root {
    /* Neutrals — warm paper */
    --paper: #f6f3ec;
    --paper-2: #efeadf;
    --paper-3: #e6dfd1;
    --ink: #1a1815;
    --ink-2: #2e2a25;
    --ink-3: #4a453d;
    --ink-4: #6b655b;
    --ink-5: #8f887c;
    --line: #d9d2c3;
    --line-2: #c7bfae;
    --surface: #fffdf8;
    --surface-raised: #ffffff;

    /* Accent — deep ink blue (not generic blue) */
    --accent: #1a3a5c;
    --accent-2: #2a5080;
    --accent-ink: #0f2540;
    --accent-wash: #e8eef5;

    /* Semantic status — muted, archival */
    --paid: #3d6b4a;      /* forest */
    --paid-wash: #e3ebdf;
    --due: #a86b1c;       /* ochre */
    --due-wash: #f4e9d4;
    --overdue: #a8332a;   /* brick */
    --overdue-wash: #f0d9d5;
    --vacant: #8f887c;    /* stone */
    --vacant-wash: #ebe6db;
    --reserved: #4a5a7a;  /* slate */
    --reserved-wash: #dfe3ec;
    --pending: #6b4a7a;   /* plum */
    --pending-wash: #e8dfed;

    /* Shadows — soft, warm */
    --shadow-sm: 0 1px 2px rgba(40,30,20,0.04);
    --shadow: 0 1px 3px rgba(40,30,20,0.06), 0 4px 12px rgba(40,30,20,0.04);
    --shadow-lg: 0 8px 32px rgba(40,30,20,0.12);

    /* Type */
    --sans: 'Geist', -apple-system, system-ui, sans-serif;
    --mono: 'Geist Mono', ui-monospace, monospace;
    --serif: 'Instrument Serif', Georgia, serif;

    /* Radii */
    --r-sm: 4px;
    --r: 6px;
    --r-lg: 10px;
    --r-xl: 14px;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: var(--sans);
    color: var(--ink);
    background: var(--paper);
    -webkit-font-smoothing: antialiased;
    font-feature-settings: 'ss01','cv11';
  }
  html, body { height: 100%; }
  .tabular { font-variant-numeric: tabular-nums; }

  /* Section shell — responsive */
  .ds-section {
    padding: 80px 80px 40px;
    border-bottom: 1px solid var(--line);
  }
  .ds-section-inner {
    display: grid;
    grid-template-columns: 260px 1fr;
    gap: 64px;
    max-width: 1600px;
  }
  .ds-section-header p { max-width: 220px; }
  .ds-grid-3 { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
  .ds-grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 32px; }
  .ds-grid-6 { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 20px; }
  .ds-flex-wrap { display: flex; gap: 20px; flex-wrap: wrap; }

  @media (max-width: 1100px) {
    .ds-section { padding: 56px 40px 32px; }
    .ds-section-inner { grid-template-columns: 1fr; gap: 32px; }
    .ds-section-header p { max-width: 480px; }
  }
  @media (max-width: 640px) {
    .ds-section { padding: 40px 24px 24px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">

// ═══════════════════════════════════════════════════════════════════
// TOKENS — exposed as JS so components can read them
// ═══════════════════════════════════════════════════════════════════
const TOKENS = {
  color: {
    paper: '#f6f3ec', paper2: '#efeadf', paper3: '#e6dfd1',
    ink: '#1a1815', ink2: '#2e2a25', ink3: '#4a453d', ink4: '#6b655b', ink5: '#8f887c',
    line: '#d9d2c3', line2: '#c7bfae',
    surface: '#fffdf8', surfaceRaised: '#ffffff',
    accent: '#1a3a5c', accent2: '#2a5080', accentInk: '#0f2540', accentWash: '#e8eef5',
    paid: '#3d6b4a', paidWash: '#e3ebdf',
    due: '#a86b1c', dueWash: '#f4e9d4',
    overdue: '#a8332a', overdueWash: '#f0d9d5',
    vacant: '#8f887c', vacantWash: '#ebe6db',
    reserved: '#4a5a7a', reservedWash: '#dfe3ec',
    pending: '#6b4a7a', pendingWash: '#e8dfed',
  },
  type: {
    display: { font: 'var(--serif)', size: 52, weight: 400, lh: 1.1, letter: -1 },
    h1:      { font: 'var(--sans)', size: 32, weight: 600, lh: 1.2, letter: -0.6 },
    h2:      { font: 'var(--sans)', size: 22, weight: 600, lh: 1.25, letter: -0.3 },
    h3:      { font: 'var(--sans)', size: 16, weight: 600, lh: 1.35, letter: -0.1 },
    body:    { font: 'var(--sans)', size: 14, weight: 400, lh: 1.5, letter: 0 },
    small:   { font: 'var(--sans)', size: 12, weight: 400, lh: 1.45, letter: 0 },
    micro:   { font: 'var(--sans)', size: 10.5, weight: 500, lh: 1.4, letter: 0.4, upper: true },
    mono:    { font: 'var(--mono)', size: 13, weight: 400, lh: 1.4, letter: 0 },
  },
  space: [0, 4, 8, 12, 16, 20, 24, 32, 40, 48, 64, 80],
  radius: { sm: 4, md: 6, lg: 10, xl: 14 },
};

// ═══════════════════════════════════════════════════════════════════
// Utility — section shell
// ═══════════════════════════════════════════════════════════════════
const Section = ({ num, title, desc, children }) => (
  <section className="ds-section">
    <div className="ds-section-inner">
      <header className="ds-section-header">
        <div style={{ fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: 1, color: TOKENS.color.ink5, marginBottom: 8 }}>
          {num}
        </div>
        <h2 style={{ margin: 0, fontFamily: 'var(--serif)', fontSize: 38, fontWeight: 400, lineHeight: 1.1, letterSpacing: -0.8, color: TOKENS.color.ink }}>
          {title}
        </h2>
        {desc && <p style={{ marginTop: 16, fontSize: 14, color: TOKENS.color.ink4, lineHeight: 1.55 }}>{desc}</p>}
      </header>
      <div style={{ minWidth: 0 }}>{children}</div>
    </div>
  </section>
);

const Label = ({ children, style }) => (
  <div style={{
    fontFamily: 'var(--mono)', fontSize: 10, letterSpacing: 0.8, textTransform: 'uppercase',
    color: TOKENS.color.ink5, marginBottom: 12, ...style,
  }}>{children}</div>
);

// ═══════════════════════════════════════════════════════════════════
// COVER
// ═══════════════════════════════════════════════════════════════════
const Cover = () => (
  <section style={{ padding: 'clamp(48px, 8vw, 96px) clamp(24px, 6vw, 80px)', borderBottom: `1px solid ${TOKENS.color.line}` }}>
    <div style={{ maxWidth: 1200 }}>
      <div style={{ fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: 2, color: TOKENS.color.ink5, marginBottom: 32, textTransform: 'uppercase' }}>
        Design System · v1.0 · April 2026
      </div>
      <h1 style={{
        margin: 0, fontFamily: 'var(--serif)', fontSize: 'clamp(56px, 10vw, 96px)', fontWeight: 400, lineHeight: 1, letterSpacing: -3,
        color: TOKENS.color.ink,
      }}>
        Suites<span style={{ fontStyle: 'italic', color: TOKENS.color.accent }}>For</span>All
      </h1>
      <div style={{ marginTop: 24, fontSize: 20, color: TOKENS.color.ink3, maxWidth: 720, lineHeight: 1.5 }}>
        A property management surface for floor plans, rent rolls, billing, and commissions.
        Built on an architectural grid — warm paper, inked lines, measured typography.
      </div>
      <div style={{ marginTop: 56, display: 'flex', gap: 'clamp(24px, 5vw, 64px)', flexWrap: 'wrap', borderTop: `1px solid ${TOKENS.color.line}`, paddingTop: 32 }}>
        {[
          ['14', 'Tokens'],
          ['22', 'Components'],
          ['6', 'Status states'],
          ['∞', 'Possibilities'],
        ].map(([n, l]) => (
          <div key={l}>
            <div style={{ fontFamily: 'var(--serif)', fontSize: 56, fontWeight: 400, lineHeight: 1, color: TOKENS.color.ink, letterSpacing: -1.5 }}>{n}</div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 11, letterSpacing: 1, color: TOKENS.color.ink5, marginTop: 8, textTransform: 'uppercase' }}>{l}</div>
          </div>
        ))}
      </div>
    </div>
  </section>
);

// ═══════════════════════════════════════════════════════════════════
// COLORS
// ═══════════════════════════════════════════════════════════════════
const Swatch = ({ name, value, hex, big, dark }) => (
  <div style={{ flex: big ? '0 0 220px' : '0 0 140px' }}>
    <div style={{
      height: big ? 140 : 92,
      background: value,
      borderRadius: 6,
      border: `1px solid ${TOKENS.color.line}`,
      display: 'flex',
      alignItems: 'flex-end',
      padding: 10,
      color: dark ? '#fff' : TOKENS.color.ink,
      fontFamily: 'var(--mono)',
      fontSize: 10,
      letterSpacing: 0.5,
    }}>
      {big && <span style={{ opacity: 0.7 }}>{hex}</span>}
    </div>
    <div style={{ marginTop: 10, fontSize: 13, fontWeight: 500, color: TOKENS.color.ink }}>{name}</div>
    <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: TOKENS.color.ink5, marginTop: 2 }}>{hex}</div>
  </div>
);

const ColorsSection = () => {
  const group = (label, entries) => (
    <div style={{ marginBottom: 40 }}>
      <Label>{label}</Label>
      <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap' }}>
        {entries.map(([n, k, dark]) => (
          <Swatch key={k} name={n} value={TOKENS.color[k]} hex={TOKENS.color[k]} dark={dark} />
        ))}
      </div>
    </div>
  );

  return (
    <Section num="01" title="Colors" desc="Warm paper, inked lines, a deep single accent. Statuses borrow from muted archival pigments — not highlighter neon.">
      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 24, marginBottom: 48 }}>
        <Swatch big name="Paper" value={TOKENS.color.paper} hex="#f6f3ec" />
        <Swatch big name="Ink" value={TOKENS.color.ink} hex="#1a1815" dark />
        <Swatch big name="Accent · Midnight" value={TOKENS.color.accent} hex="#1a3a5c" dark />
        <Swatch big name="Surface" value={TOKENS.color.surface} hex="#fffdf8" />
      </div>

      {group('Neutrals', [
        ['Paper', 'paper'], ['Paper 2', 'paper2'], ['Paper 3', 'paper3'],
        ['Line', 'line'], ['Line 2', 'line2'],
        ['Ink 5', 'ink5'], ['Ink 4', 'ink4'], ['Ink 3', 'ink3', true], ['Ink 2', 'ink2', true], ['Ink', 'ink', true],
      ])}

      {group('Accent', [
        ['Wash', 'accentWash'], ['Accent 2', 'accent2', true], ['Accent', 'accent', true], ['Accent Ink', 'accentInk', true],
      ])}

      <Label>Status · lease lifecycle</Label>
      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fit, minmax(140px, 1fr))', gap: 12 }}>
        {[
          ['Paid', 'paid', 'paidWash'],
          ['Due', 'due', 'dueWash'],
          ['Overdue', 'overdue', 'overdueWash'],
          ['Reserved', 'reserved', 'reservedWash'],
          ['Pending', 'pending', 'pendingWash'],
          ['Vacant', 'vacant', 'vacantWash'],
        ].map(([n, dk, wk]) => (
          <div key={n}>
            <div style={{ display: 'flex', height: 64, borderRadius: 6, overflow: 'hidden', border: `1px solid ${TOKENS.color.line}` }}>
              <div style={{ flex: 2, background: TOKENS.color[wk] }} />
              <div style={{ flex: 1, background: TOKENS.color[dk] }} />
            </div>
            <div style={{ marginTop: 10, fontSize: 12.5, fontWeight: 500 }}>{n}</div>
            <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: TOKENS.color.ink5, marginTop: 2 }}>{TOKENS.color[dk]}</div>
          </div>
        ))}
      </div>
    </Section>
  );
};

// ═══════════════════════════════════════════════════════════════════
// TYPOGRAPHY
// ═══════════════════════════════════════════════════════════════════
const TypographySection = () => {
  const row = (key, sample, meta) => {
    const t = TOKENS.type[key];
    return (
      <div key={key} style={{
        display: 'grid', gridTemplateColumns: '120px 1fr 200px', gap: 32,
        padding: '20px 0', borderTop: `1px solid ${TOKENS.color.line}`, alignItems: 'baseline',
      }}>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: TOKENS.color.ink5, textTransform: 'uppercase', letterSpacing: 0.6 }}>
          {key}
        </div>
        <div style={{
          fontFamily: t.font, fontSize: t.size, fontWeight: t.weight,
          lineHeight: t.lh, letterSpacing: t.letter,
          textTransform: t.upper ? 'uppercase' : 'none',
          color: TOKENS.color.ink,
        }}>
          {sample}
        </div>
        <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: TOKENS.color.ink5, lineHeight: 1.6 }}>
          {meta}
        </div>
      </div>
    );
  };

  return (
    <Section num="02" title="Typography" desc="Geist for UI. Instrument Serif for display, numbers, pull-quotes. Geist Mono for tabular data, IDs, timestamps.">
      <div style={{ marginBottom: 40, display: 'flex', gap: 48 }}>
        <div>
          <Label>Sans · Geist</Label>
          <div style={{ fontSize: 64, fontFamily: 'var(--sans)', fontWeight: 500, letterSpacing: -1.5, lineHeight: 1 }}>Aa Bb Cc</div>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: TOKENS.color.ink5, marginTop: 8 }}>400 / 500 / 600 / 700</div>
        </div>
        <div>
          <Label>Serif · Instrument</Label>
          <div style={{ fontSize: 64, fontFamily: 'var(--serif)', fontWeight: 400, letterSpacing: -1.5, lineHeight: 1 }}>Aa <span style={{ fontStyle: 'italic' }}>Bb</span> Cc</div>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: TOKENS.color.ink5, marginTop: 8 }}>Regular · Italic</div>
        </div>
        <div>
          <Label>Mono · Geist</Label>
          <div style={{ fontSize: 56, fontFamily: 'var(--mono)', fontWeight: 400, letterSpacing: -0.5, lineHeight: 1 }}>0123</div>
          <div style={{ fontFamily: 'var(--mono)', fontSize: 11, color: TOKENS.color.ink5, marginTop: 8 }}>Tabular · 400 / 500</div>
        </div>
      </div>

      <div>
        {row('display', '$2,384,500', '52 / 62 · serif · -1')}
        {row('h1', 'Pinellas Park', '32 / 38 · sans 600 · -0.6')}
        {row('h2', '4th Floor · 48 suites', '22 / 28 · sans 600 · -0.3')}
        {row('h3', 'Tenant details', '16 / 22 · sans 600 · -0.1')}
        {row('body', 'Rent collected on the 1st of each month.', '14 / 21 · sans 400')}
        {row('small', 'Last updated 2h ago', '12 / 17 · sans 400')}
        {row('micro', 'Status · Overdue', '10.5 / 15 · sans 500 · UPPER')}
        {row('mono', '$1,245.00 · Suite 408', '13 / 18 · mono 400')}
      </div>
    </Section>
  );
};

// ═══════════════════════════════════════════════════════════════════
// SPACING · RADII · SHADOWS
// ═══════════════════════════════════════════════════════════════════
const SpacingSection = () => (
  <Section num="03" title="Space & grid" desc="4-pt base. 8 is the beat. Spacing doubles up at major divisions — 16, 32, 64.">
    <Label>Spacing scale</Label>
    <div style={{ display: 'flex', gap: 20, alignItems: 'flex-end', marginBottom: 48, flexWrap: 'wrap' }}>
      {TOKENS.space.slice(1).map((s) => (
        <div key={s} style={{ textAlign: 'center' }}>
          <div style={{ width: s, height: s, background: TOKENS.color.accent, borderRadius: 2 }} />
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10, color: TOKENS.color.ink5, marginTop: 8 }}>{s}</div>
        </div>
      ))}
    </div>

    <Label>Radii</Label>
    <div style={{ display: 'flex', gap: 16, marginBottom: 48 }}>
      {[['sm', 4], ['md', 6], ['lg', 10], ['xl', 14]].map(([n, r]) => (
        <div key={n}>
          <div style={{ width: 80, height: 80, background: TOKENS.color.surface, border: `1px solid ${TOKENS.color.line}`, borderRadius: r }} />
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: TOKENS.color.ink5, marginTop: 8 }}>{n} · {r}px</div>
        </div>
      ))}
    </div>

    <Label>Elevation</Label>
    <div style={{ display: 'flex', gap: 32 }}>
      {[
        ['sm', '0 1px 2px rgba(40,30,20,0.04)'],
        ['base', '0 1px 3px rgba(40,30,20,0.06), 0 4px 12px rgba(40,30,20,0.04)'],
        ['lg', '0 8px 32px rgba(40,30,20,0.12)'],
      ].map(([n, s]) => (
        <div key={n}>
          <div style={{ width: 180, height: 100, background: TOKENS.color.surfaceRaised, borderRadius: 8, boxShadow: s, border: `1px solid ${TOKENS.color.line}` }} />
          <div style={{ fontFamily: 'var(--mono)', fontSize: 10.5, color: TOKENS.color.ink5, marginTop: 8 }}>{n}</div>
        </div>
      ))}
    </div>
  </Section>
);

// ═══════════════════════════════════════════════════════════════════
// COMPONENTS
// ═══════════════════════════════════════════════════════════════════

// Button
const Button = ({ variant = 'primary', size = 'md', children, icon, iconRight, style, ...rest }) => {
  const variants = {
    primary:  { bg: TOKENS.color.ink, fg: TOKENS.color.paper, bd: TOKENS.color.ink },
    secondary:{ bg: TOKENS.color.surface, fg: TOKENS.color.ink, bd: TOKENS.color.line2 },
    ghost:    { bg: 'transparent', fg: TOKENS.color.ink3, bd: 'transparent' },
    accent:   { bg: TOKENS.color.accent, fg: '#fff', bd: TOKENS.color.accent },
    danger:   { bg: TOKENS.color.overdue, fg: '#fff', bd: TOKENS.color.overdue },
  };
  const sizes = {
    sm: { h: 28, px: 10, fs: 12.5 },
    md: { h: 36, px: 14, fs: 13.5 },
    lg: { h: 44, px: 20, fs: 14.5 },
  };
  const v = variants[variant]; const s = sizes[size];
  return (
    <button {...rest} style={{
      display: 'inline-flex', alignItems: 'center', gap: 8,
      height: s.h, padding: `0 ${s.px}px`, fontSize: s.fs, fontWeight: 500,
      fontFamily: 'var(--sans)', color: v.fg, background: v.bg,
      border: `1px solid ${v.bd}`, borderRadius: 6,
      cursor: 'pointer', letterSpacing: -0.1,
      transition: 'background 120ms, border-color 120ms, transform 60ms',
      ...style,
    }}>
      {icon}{children}{iconRight}
    </button>
  );
};

// Input
const Input = ({ label, value, placeholder, prefix, suffix, monospace, style }) => (
  <div style={{ ...style }}>
    {label && <Label style={{ marginBottom: 6 }}>{label}</Label>}
    <div style={{
      display: 'flex', alignItems: 'center', height: 38,
      background: TOKENS.color.surface, border: `1px solid ${TOKENS.color.line2}`,
      borderRadius: 6, padding: '0 12px', gap: 8,
    }}>
      {prefix && <span style={{ fontSize: 13, color: TOKENS.color.ink5, fontFamily: monospace ? 'var(--mono)' : 'var(--sans)' }}>{prefix}</span>}
      <input defaultValue={value} placeholder={placeholder} style={{
        flex: 1, border: 'none', outline: 'none', background: 'transparent',
        fontSize: 13.5, color: TOKENS.color.ink, fontFamily: monospace ? 'var(--mono)' : 'var(--sans)',
      }} />
      {suffix && <span style={{ fontSize: 13, color: TOKENS.color.ink5 }}>{suffix}</span>}
    </div>
  </div>
);

// Status pill
const Pill = ({ status = 'paid', label, dot = true }) => {
  const map = {
    paid:     { fg: TOKENS.color.paid, wash: TOKENS.color.paidWash, default: 'Paid' },
    due:      { fg: TOKENS.color.due, wash: TOKENS.color.dueWash, default: 'Due' },
    overdue:  { fg: TOKENS.color.overdue, wash: TOKENS.color.overdueWash, default: 'Overdue' },
    reserved: { fg: TOKENS.color.reserved, wash: TOKENS.color.reservedWash, default: 'Reserved' },
    pending:  { fg: TOKENS.color.pending, wash: TOKENS.color.pendingWash, default: 'Pending' },
    vacant:   { fg: TOKENS.color.vacant, wash: TOKENS.color.vacantWash, default: 'Vacant' },
  };
  const m = map[status];
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '3px 9px 3px 8px',
      background: m.wash, color: m.fg,
      borderRadius: 4, fontSize: 11.5, fontWeight: 500,
      fontFamily: 'var(--sans)', letterSpacing: 0.1,
    }}>
      {dot && <span style={{ width: 6, height: 6, borderRadius: 3, background: m.fg }} />}
      {label || m.default}
    </span>
  );
};

// Card
const Card = ({ title, subtitle, children, actions, style }) => (
  <div style={{
    background: TOKENS.color.surface, border: `1px solid ${TOKENS.color.line}`,
    borderRadius: 8, padding: 20, ...style,
  }}>
    {(title || actions) && (
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: children ? 16 : 0 }}>
        <div>

const Avatar = ({ name, size = 32, color }) => {
  const initials = name.split(' ').map((s) => s[0]).join('').slice(0, 2).toUpperCase();

  const bgs = [TOKENS.color.paid, TOKENS.color.due, TOKENS.color.reserved, TOKENS.color.pending, TOKENS.color.accent];
  const bg = color || bgs[hash % bgs.length];
  return (
    <div style={{
      width: size, height: size, borderRadius: size / 2,
      background: bg, color: '#fff',
      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
      fontSize: size * 0.38, fontWeight: 600, fontFamily: 'var(--sans)',
      letterSpacing: 0.3,

};

  const paths = {
    map: <><path d="M7 3L1 5v12l6-2 6 2 6-2V3l-6 2-6-2z"/><path d="M7 3v12M13 5v12"/></>,
    building: <><path d="M3 17V4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v13"/><path d="M1 17h18M7 7h2M11 7h2M7 10h2M11 10h2M7 13h2M11 13h2"/></>,
    chart: <><path d="M3 3v14h14"/><path d="M7 13l3-4 3 2 4-5"/></>,
    users: <><circle cx="7" cy="7" r="3"/><circle cx="14" cy="8" r="2.5"/><path d="M1 17c0-3 2.5-5 6-5s6 2 6 5M13 17c0-2.5 2-4 5-4"/></>,
    dollar: <><path d="M10 2v16M14 5H8.5a2.5 2.5 0 0 0 0 5h3a2.5 2.5 0 0 1 0 5H5"/></>,
    doc: <><path d="M5 2h8l4 4v12H5z"/><path d="M13 2v4h4M8 10h6M8 13h6M8 7h2"/></>,
    search: <><circle cx="8" cy="8" r="5"/><path d="M12 12l5 5"/></>,
    bell: <><path d="M5 8a5 5 0 0 1 10 0v4l2 3H3l2-3z"/><path d="M8 17a2 2 0 0 0 4 0"/></>,
    plus: <><path d="M10 4v12M4 10h12"/></>,

    calendar: <><rect x="2" y="4" width="16" height="14" rx="1"/><path d="M2 8h16M6 2v4M14 2v4"/></>,
  };
  return (
    <svg width={size} height={size} viewBox="0 0 20 20" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" style={{ display: 'block' }}>
      {paths[name]}
    </svg>
  );
};

// Sparkline
const Spark = ({ data, color = TOKENS.color.accent, width = 140, height = 36 }) => {
  const max = Math.max(...data); const min = Math.min(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) => `${(i / (data.length - 1)) * width},${height - ((v - min) / range) * height}`);
  return (
    <svg width={width} height={height} style={{ display: 'block' }}>
      <polyline points={pts.join(' ')} fill="none" stroke={color} strokeWidth={1.5} strokeLinejoin="round" />
      <circle cx={pts[pts.length - 1].split(',')[0]} cy={pts[pts.length - 1].split(',')[1]} r={3} fill={color} />
    </svg>
  );
};

// Bar chart (mini)
const MiniBars = ({ data, color = TOKENS.color.ink, width = 200, height = 50 }) => {
  const max = Math.max(...data);
  const bw = (width - (data.length - 1) * 3) / data.length;
  return (
    <svg width={width} height={height}>
      {data.map((v, i) => {
        const h = (v / max) * height;
        return <rect key={i} x={i * (bw + 3)} y={height - h} width={bw} height={h} fill={color} rx={1} />;
      })}
    </svg>
  );
};
