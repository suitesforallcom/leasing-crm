<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Activity & Productivity Center · Pulse</title>
  <!-- Phase 17 rev — Pulse-specific favicon (tree icon matching topbar
       button). Floor-map использует другой favicon (suitesforall логотип). -->
  <link rel="icon" type="image/svg+xml" href="/pulse/favicon.svg" />
  <link rel="alternate icon" href="/pulse/favicon.svg" />
  <link rel="mask-icon" href="/pulse/favicon.svg" color="#15803d" />

  <!-- Auth gate — pulse.html doesn't have its own sign-in UI. Floor-map
       is the auth entry point. If no signed-in state in localStorage,
       send the operator to floor-map first (it'll bring them back).
       Same-origin so all auth/state persists across both pages. -->
  <script>
    (function () {
      try {
        if (!localStorage.getItem('sfa_v5_state')) {
          window.location.replace('/floor-map-editor.html?next=' + encodeURIComponent(location.pathname));
        }
      } catch (e) { /* if localStorage is blocked we let pulse render the mock data */ }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/pulse/styles.css" />
  <!-- Phase 18 — Pulse Firebase bridge for on-demand CF calls
       (getAircallRecording, etc.). Plain JS, no Babel. Lazy-loads
       Firebase SDK from gstatic on first call. -->
  <script src="/pulse/firebase-bridge.js?v=20260524e"></script>
</head>
<body>
  <!-- Tony 2026-05-23: «кнопка возврата чтобы из пульс статистики можно
       было вернуться к нашему обычному сайту». Floating back-button —
       sits outside the React root, всегда виден (даже до того как React
       сядет / если jsx упадёт). Top-RIGHT corner (was top-left but
       overlapped Pulse logo per Tony 2026-05-23 follow-up). Same-origin
       link → auth и state сохраняются. -->
  <a href="/floor-map-editor.html"
     id="pulseBackBtn"
     title="Back to floor map / main app"
     style="
       position: fixed; top: 12px; right: 14px; z-index: 99999;
       display: inline-flex; align-items: center; gap: 5px;
       padding: 5px 10px; border-radius: 6px;
       background: rgba(255,255,255,0.92);
       border: 1px solid #d4d4d8;
       color: #18181b; text-decoration: none;
       font-family: 'Manrope', -apple-system, system-ui, sans-serif;
       font-size: 11.5px; font-weight: 600;
       box-shadow: 0 2px 6px rgba(0,0,0,0.06);
       backdrop-filter: blur(4px);
       transition: background 120ms, transform 120ms;
     "
     onmouseover="this.style.background='rgba(255,255,255,1)';this.style.transform='translateY(-1px)'"
     onmouseout="this.style.background='rgba(255,255,255,0.92)';this.style.transform=''">
    <span style="font-size: 12px; line-height: 1;">←</span>
    Floor map
  </a>

  <div id="root">
    <!-- Pulse uses in-browser Babel for ~20 .jsx files. First-paint takes
         5-15s while Babel compiles. Without this placeholder operator sees
         a blank page and assumes it's broken. React replaces this whole
         element when it mounts. -->
    <div id="pulse-boot" style="
      display:flex; align-items:center; justify-content:center;
      min-height:100vh; flex-direction:column; gap:18px;
      font-family:'Manrope',-apple-system,system-ui,sans-serif;
      color:#475569; background:#fafaf9;
    ">
      <div style="
        width:42px; height:42px; border-radius:50%;
        border:3px solid #e2e8f0; border-top-color:#6366f1;
        animation:pulse-spin 0.9s linear infinite;
      "></div>
      <div style="font-size:14px; font-weight:600;">Loading Pulse…</div>
      <div style="font-size:11.5px; color:#94a3b8;">Compiling components (5-15s on first load)</div>
    </div>
    <style>@keyframes pulse-spin { to { transform: rotate(360deg); } }</style>
  </div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App modules — order matters -->
  <script type="text/babel" src="/pulse/icons.jsx"></script>
  <script type="text/babel" src="/pulse/data.jsx"></script>
  <!-- Real-data shim — replaces mock USERS/CENTERS/EVENTS with values
       from floor-map's state in localStorage. Cache-busted because the
       prototype's .jsx files get a default 1h CDN cache; bump the v=
       query when shim logic changes. -->
  <script type="text/babel" src="/pulse/data-shim.jsx?v=20260524d"></script>
  <script type="text/babel" src="/pulse/components.jsx?v=20260520b"></script>
  <script type="text/babel" src="/pulse/forms.jsx"></script>
  <script type="text/babel" src="/pulse/metrics.jsx?v=20260519b"></script>
  <script type="text/babel" src="/pulse/layout.jsx?v=20260524c"></script>
  <script type="text/babel" src="/pulse/overview.jsx?v=20260524a"></script>
  <script type="text/babel" src="/pulse/employee-detail.jsx?v=20260521f"></script>
  <script type="text/babel" src="/pulse/compare.jsx?v=20260520a"></script>
  <!-- HubSpot insights — standalone page (extracted from overview 2026-05-24).
       Must load BEFORE app.jsx so `window.HubspotPage` is defined when App
       references it in its global declaration. -->
  <script type="text/babel" src="/pulse/hubspot.jsx?v=20260524c"></script>
  <!-- Marketing — channel-mix dashboard (Phase 1: HubSpot source data;
       Phase 2: Google Ads / Meta / TikTok / GA4 spend). -->
  <script type="text/babel" src="/pulse/marketing.jsx?v=20260524i"></script>
  <!-- Connections — unified Settings page for all integrations
       (HubSpot, Google Ads, Meta, TikTok, GA4). Operator manages
       accounts + notes from here. -->
  <script type="text/babel" src="/pulse/connections.jsx?v=20260524d"></script>
  <script type="text/babel" src="/pulse/bonuses.jsx"></script>
  <script type="text/babel" src="/pulse/bonus-rules.jsx"></script>
  <script type="text/babel" src="/pulse/centers.jsx"></script>
  <script type="text/babel" src="/pulse/tree.jsx"></script>
  <script type="text/babel" src="/pulse/calendar.jsx?v=20260519a"></script>
  <script type="text/babel" src="/pulse/my-day.jsx?v=20260524d"></script>
  <script type="text/babel" src="/pulse/my-journey.jsx?v=20260520a"></script>
  <script type="text/babel" src="/pulse/earn-page.jsx?v=20260521c"></script>
  <script type="text/babel" src="/pulse/audit.jsx?v=20260519j"></script>
  <script type="text/babel" src="/pulse/enhancements.jsx"></script>
  <script type="text/babel" src="/pulse/other-views.jsx?v=20260524a"></script>
  <script type="text/babel" src="/pulse/drawer.jsx"></script>
  <script type="text/babel" src="/pulse/tweaks-panel.jsx"></script>
  <script type="text/babel" src="/pulse/app.jsx?v=20260524e"></script>
</body>
</html>
