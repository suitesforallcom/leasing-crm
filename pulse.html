<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Activity & Productivity Center · Pulse</title>

  <!-- Auth gate — pulse.html doesn't have its own sign-in UI. Floor-map
       is the auth entry point. If no signed-in state in localStorage,
       send the operator to floor-map first (it'll bring them back).
       Same-origin so all auth/state persists across both pages. -->
  <script>
    (function () {
      try {
        if (!localStorage.getItem('sfa_v5_state')) {
          window.location.replace('/floor-map-editor.html?next=' + encodeURIComponent(location.pathname));
        }
      } catch (e) { /* if localStorage is blocked we let pulse render the mock data */ }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="/pulse/styles.css" />
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel (pinned) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- App modules — order matters -->
  <script type="text/babel" src="/pulse/icons.jsx"></script>
  <script type="text/babel" src="/pulse/data.jsx"></script>
  <!-- Real-data shim — replaces mock USERS/CENTERS with values from
       /floor-map-editor.html's state in localStorage. Runs before any
       page module so React mounts with real people on the first render. -->
  <script type="text/babel" src="/pulse/data-shim.jsx"></script>
  <script type="text/babel" src="/pulse/components.jsx"></script>
  <script type="text/babel" src="/pulse/forms.jsx"></script>
  <script type="text/babel" src="/pulse/metrics.jsx"></script>
  <script type="text/babel" src="/pulse/layout.jsx"></script>
  <script type="text/babel" src="/pulse/overview.jsx"></script>
  <script type="text/babel" src="/pulse/employee-detail.jsx"></script>
  <script type="text/babel" src="/pulse/compare.jsx"></script>
  <script type="text/babel" src="/pulse/bonuses.jsx"></script>
  <script type="text/babel" src="/pulse/bonus-rules.jsx"></script>
  <script type="text/babel" src="/pulse/centers.jsx"></script>
  <script type="text/babel" src="/pulse/tree.jsx"></script>
  <script type="text/babel" src="/pulse/calendar.jsx"></script>
  <script type="text/babel" src="/pulse/my-day.jsx"></script>
  <script type="text/babel" src="/pulse/my-journey.jsx"></script>
  <script type="text/babel" src="/pulse/earn-page.jsx"></script>
  <script type="text/babel" src="/pulse/audit.jsx"></script>
  <script type="text/babel" src="/pulse/enhancements.jsx"></script>
  <script type="text/babel" src="/pulse/other-views.jsx"></script>
  <script type="text/babel" src="/pulse/drawer.jsx"></script>
  <script type="text/babel" src="/pulse/tweaks-panel.jsx"></script>
  <script type="text/babel" src="/pulse/app.jsx"></script>
</body>
</html>
